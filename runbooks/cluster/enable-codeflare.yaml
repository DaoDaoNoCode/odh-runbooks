name: cluster-enable-codeflare
description: >
  Enable CodeFlare (distributed workloads) in DataScienceCluster.
  CodeFlare provides Ray, Kueue, and MCAD for distributed training and batch jobs.
  Per ADR-DW-0001, ODH maintains its own fork of CodeFlare (snapshot, not diverged).
  HOW THE OPERATOR WORKS (opendatahub-operator):
  Patching managementState to 'Managed' in DSC is the ONLY action needed here.
  The opendatahub-operator automatically creates ALL child resources:
  Deployments, Services, ConfigMaps, CRDs, RBAC, Routes — everything.
  Do NOT manually create any of these — the operator manages them.
  Resources in the ODH namespace are created with opendatahub.io/managed absent
  (create-once behavior) unless explicitly marked managed=true (operator overwrites).
  To customize an operator-created resource: edit it directly — changes persist
  since resources are not continuously reconciled by default.
  Source: github.com/opendatahub-io/opendatahub-operator
rhoai_version_tested: null
confidence_overall: doc-derived

parameters: []

steps:
  - id: enable-codeflare
    confidence: doc-derived
    description: Enable CodeFlare component in DataScienceCluster
    requires:
      - type: dsc-exists
    pre_check:
      command: "oc get dsc -o jsonpath='{.items[0].spec.components.codeflare.managementState}'"
      expected: "Managed"
      if_already_true: skip
      on_fail: STOP
    action:
      type: patch
      target: "$(oc get dsc -o name | head -1)"
      patch: '{"spec":{"components":{"codeflare":{"managementState":"Managed"}}}}'
      dry_run: false
    post_check:
      command: "oc get dsc -o jsonpath='{.items[0].spec.components.codeflare.managementState}'"
      expected: "Managed"
      timeout: "30s"
      on_fail: STOP

  - id: enable-ray
    confidence: doc-derived
    description: Enable Ray component (required for distributed workloads)
    pre_check:
      command: "oc get dsc -o jsonpath='{.items[0].spec.components.ray.managementState}'"
      expected: "Managed"
      if_already_true: skip
      on_fail: STOP
    action:
      type: patch
      target: "$(oc get dsc -o name | head -1)"
      patch: '{"spec":{"components":{"ray":{"managementState":"Managed"}}}}'
      dry_run: false
    post_check:
      command: "oc get dsc -o jsonpath='{.items[0].spec.components.ray.managementState}'"
      expected: "Managed"
      timeout: "30s"
      on_fail: STOP

  - id: enable-kueue
    confidence: doc-derived
    description: Enable Kueue for resource quota and job queuing
    pre_check:
      command: "oc get dsc -o jsonpath='{.items[0].spec.components.kueue.managementState}'"
      expected: "Managed"
      if_already_true: skip
      on_fail: STOP
    action:
      type: patch
      target: "$(oc get dsc -o name | head -1)"
      patch: '{"spec":{"components":{"kueue":{"managementState":"Managed"}}}}'
      dry_run: false
    post_check:
      command: "oc get dsc -o jsonpath='{.items[0].spec.components.kueue.managementState}'"
      expected: "Managed"
      timeout: "30s"
      on_fail: STOP

  - id: wait-codeflare-ready
    confidence: doc-derived
    description: Wait for DataScienceCluster to finish reconciling CodeFlare/Ray/Kueue
    action:
      type: wait
      command: "oc wait dsc --all --for=condition=Ready --timeout=300s 2>/dev/null || sleep 10"
    post_check:
      command: "oc get crd rayclusters.ray.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "300s"
      poll_interval: "15s"
      on_fail: STOP
    return: |
      ✓ CodeFlare / Distributed Workloads enabled.

      Components: CodeFlare, Ray, Kueue
      CRDs: RayCluster (ray.io/v1), AppWrapper, ResourceFlavor

      Next step: odh run distributed-workloads/submit-ray-job

  - id: verify-dashboard-config
    confidence: doc-derived
    description: >
      Verify OdhDashboardConfig shows Distributed Workloads in the dashboard.
      Checks disableDistributedWorkloads — if true the workload metrics section
      won't appear even with CodeFlare/Ray/Kueue running.
    action:
      type: query
      command: |
        ODH_NS=$(oc get odhdashboardconfig --all-namespaces --no-headers -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || echo 'redhat-ods-applications')
        CFG=$(oc get odhdashboardconfig -n $ODH_NS -o name 2>/dev/null | head -1)
        if [ -z "$CFG" ]; then
          echo "ok: OdhDashboardConfig not found (older ODH version — skipping)"
          exit 0
        fi
        DIS=$(oc get odhdashboardconfig -n $ODH_NS -o jsonpath='{.spec.dashboardConfig.disableDistributedWorkloads}' 2>/dev/null)
        if [ "$DIS" = "true" ]; then
          echo "Fixing: disableDistributedWorkloads=true — patching to false"
          oc patch $CFG -n $ODH_NS --type merge \
            -p '{"spec":{"dashboardConfig":{"disableDistributedWorkloads":false}}}'
        else
          echo "OK: disableDistributedWorkloads is not true"
        fi
        echo "done"
      store_as: dashboard_flag_status
    post_check:
      command: |
        ODH_NS=$(oc get odhdashboardconfig --all-namespaces --no-headers -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || echo 'redhat-ods-applications')
        DIS=$(oc get odhdashboardconfig -n $ODH_NS -o jsonpath='{.spec.dashboardConfig.disableDistributedWorkloads}' 2>/dev/null)
        [ "$DIS" != "true" ] && echo "ok" || echo "blocked"
      expected: "ok"
      timeout: "30s"
      on_fail: STOP
    on_fail_hint: >
      Distributed Workloads blocked in dashboard config. Fix: patch odhdashboardconfig --type merge -p '{"spec":{"dashboardConfig":{"disableDistributedWorkloads":false}}}'

source_repos:
  - "https://github.com/project-codeflare/codeflare-operator"
  - "https://github.com/ray-project/kuberay"
  - "https://github.com/opendatahub-io/kuberay"
  - "https://github.com/project-codeflare/codeflare-sdk"
  - "https://github.com/kubernetes-sigs/kueue"
  - "https://github.com/opendatahub-io/opendatahub-operator"

known_bad_patterns:
  - "never assume the component shows in the dashboard just because the DSC component is Managed — also check OdhDashboardConfig feature flags (disable* = false, tech preview = true)"
  - "never install the community CodeFlare operator separately — ODH manages its own fork and they cannot coexist on the same cluster"
  - "never enable CodeFlare without also enabling Kueue — jobs will not be queued correctly"
  - "never submit a RayJob without first creating a Kueue ResourceFlavor and ClusterQueue"

rollback_order:
  - "oc patch $(oc get dsc -o name | head -1) --type merge -p '{\"spec\":{\"components\":{\"codeflare\":{\"managementState\":\"Removed\"}}}}'"
  - "oc patch $(oc get dsc -o name | head -1) --type merge -p '{\"spec\":{\"components\":{\"ray\":{\"managementState\":\"Removed\"}}}}'"
  - "oc patch $(oc get dsc -o name | head -1) --type merge -p '{\"spec\":{\"components\":{\"kueue\":{\"managementState\":\"Removed\"}}}}'"
