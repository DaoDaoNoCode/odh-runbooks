name: cluster-enable-kserve
description: >
  Enable KServe in Standard mode (RawDeployment) in the DataScienceCluster.
  Standard mode uses Kubernetes Deployments/Services/Routes without Serverless/Knative.
  This is the correct mode for RHOAI without Service Mesh or Serverless operators.

  DSC configuration (source of truth: opendatahub-operator kserve_types.go):
    managementState: Managed              — enables KServe
    rawDeploymentServiceConfig: Headed   — Headed=normal K8s load balancing (ServiceClusterIPNone=false)
                                           Headless=direct pod addressing (ServiceClusterIPNone=true, default)

  Fields that do NOT exist (ignore if seen in older docs):
    defaultDeploymentMode — RawDeployment is the ONLY supported mode, no field to select it
    serving.managementState — not a real DSC field
    serviceMesh configuration — not configurable via DSC/DSCI

  BUILT-IN ServingRuntimes provided by RHOAI (do not create manually):
    GPU: "vLLM NVIDIA GPU ServingRuntime for KServe"   — reference by name in InferenceService
    CPU: Based on "vLLM CPU (ppc64le/s390x) ServingRuntime for KServe" — EXPERIMENTAL, not supported
         Must be duplicated and modified for amd64 (image: quay.io/rh-aiservices-bu/vllm-cpu-openai-ubi9:0.3)
  HOW THE OPERATOR WORKS (opendatahub-operator):
  Patching managementState to 'Managed' in DSC is the ONLY action needed here.
  The opendatahub-operator automatically creates ALL child resources:
  Deployments, Services, ConfigMaps, CRDs, RBAC, Routes — everything.
  Do NOT manually create any of these — the operator manages them.
  Resources in the ODH namespace are created with opendatahub.io/managed absent
  (create-once behavior) unless explicitly marked managed=true (operator overwrites).
  To customize an operator-created resource: edit it directly — changes persist
  since resources are not continuously reconciled by default.
  Source: github.com/opendatahub-io/opendatahub-operator
rhoai_version_tested: null
confidence_overall: doc-derived

parameters:
  - name: deployment_mode
    description: "KServe deployment mode: Serverless (requires Service Mesh) or RawDeployment (simpler)"
    required: false
    default: RawDeployment

steps:
  - id: check-dsc-exists
    confidence: doc-derived
    description: Verify DataScienceCluster exists
    requires:
      - type: dsc-exists
    pre_check:
      command: "oc get dsc --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      on_fail: STOP
    action:
      type: none
    post_check:
      command: "oc get dsc --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "10s"
      on_fail: STOP

  - id: enable-kserve
    confidence: doc-derived
    description: Enable KServe in DataScienceCluster with RawDeployment mode
    pre_check:
      command: "oc get dsc -o jsonpath='{.items[0].spec.components.kserve.managementState}'"
      expected: "Managed"
      if_already_true: skip
      on_fail: STOP
    action:
      type: patch
      target: "$(oc get dsc -o name | head -1)"
      patch: >
        {"spec":{"components":{"kserve":{
          "managementState":"Managed",
          "rawDeploymentServiceConfig":"Headed"
        }}}}
      # SOURCE: opendatahub-operator kserve_types.go
      # Valid fields: managementState (Managed|Removed), rawDeploymentServiceConfig (Headed|Headless)
      dry_run: false
    post_check:
      command: "oc get dsc -o jsonpath='{.items[0].spec.components.kserve.managementState}'"
      expected: "Managed"
      timeout: "30s"
      on_fail: STOP

  - id: wait-kserve-ready
    confidence: doc-derived
    description: Wait for DataScienceCluster to finish reconciling KServe
    action:
      type: wait
      command: "oc wait dsc --all --for=condition=Ready --timeout=300s 2>/dev/null || sleep 10"
    post_check:
      command: "oc get crd inferenceservices.serving.kserve.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "300s"
      poll_interval: "15s"
      on_fail: STOP

  - id: verify-kserve-crds
    confidence: doc-derived
    description: Verify KServe CRDs are installed
    action:
      type: query
      command: "oc get crd inferenceservices.serving.kserve.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      store_as: crd_count
    post_check:
      command: "oc get crd inferenceservices.serving.kserve.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "30s"
      on_fail: STOP
    return: |
      ✓ KServe enabled successfully.

      CRD available: serving.kserve.io/v1beta1 InferenceService
      Deployment mode: {{ deployment_mode }}

      Next steps:
        - Deploy a model: odh run model-serving/deploy-kserve-model -p project_namespace=<ns> -p model_uri=<uri>
        - Dashboard: Projects → <your-project> → Models and model servers

  - id: verify-dashboard-config
    confidence: doc-derived
    description: >
      Verify OdhDashboardConfig shows model serving in the dashboard.
      The dashboard checks disableModelServing and disableKServe flags — if either
      is explicitly true the Models section won't appear even with KServe running.
      Auto-fixes if disabled.
    action:
      type: query
      command: |
        ODH_NS=$(oc get odhdashboardconfig --all-namespaces --no-headers -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || echo 'redhat-ods-applications')
        CFG=$(oc get odhdashboardconfig -n $ODH_NS -o name 2>/dev/null | head -1)
        if [ -z "$CFG" ]; then
          echo "ok: OdhDashboardConfig not found (older ODH version — skipping)"
          exit 0
        fi
        DIS_MS=$(oc get odhdashboardconfig -n $ODH_NS -o jsonpath='{.spec.dashboardConfig.disableModelServing}' 2>/dev/null)
        DIS_KS=$(oc get odhdashboardconfig -n $ODH_NS -o jsonpath='{.spec.dashboardConfig.disableKServe}' 2>/dev/null)
        if [ "$DIS_MS" = "true" ] || [ "$DIS_KS" = "true" ]; then
          echo "Fixing dashboard flags: disableModelServing=$DIS_MS disableKServe=$DIS_KS"
          oc patch $CFG -n $ODH_NS --type merge \
            -p '{"spec":{"dashboardConfig":{"disableModelServing":false,"disableKServe":false}}}'
        else
          echo "OK: model serving flags are not disabled"
        fi
        echo "done"
      store_as: dashboard_flag_status
    post_check:
      command: |
        ODH_NS=$(oc get odhdashboardconfig --all-namespaces --no-headers -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || echo 'redhat-ods-applications')
        DIS=$(oc get odhdashboardconfig -n $ODH_NS -o jsonpath='{.spec.dashboardConfig.disableModelServing}' 2>/dev/null)
        [ "$DIS" != "true" ] && echo "ok" || echo "blocked"
      expected: "ok"
      timeout: "30s"
      on_fail: STOP
    on_fail_hint: >
      Dashboard config is blocking model serving. Fix: oc patch $(oc get odhdashboardconfig -n redhat-ods-applications -o name | head -1) -n redhat-ods-applications --type merge -p '{"spec":{"dashboardConfig":{"disableModelServing":false,"disableKServe":false}}}'

source_repos:
  - "https://github.com/opendatahub-io/opendatahub-operator"
  - "https://github.com/kserve/kserve"

known_bad_patterns:
  - "never assume the component shows in the dashboard just because the DSC component is Managed — also check OdhDashboardConfig feature flags (disable* = false, tech preview = true)"
  - "never enable KServe with Serverless mode without first installing OpenShift Service Mesh and Serverless — it will fail silently"
  - "never delete the InferenceService CRD manually — it will break all deployed models"
  - "never set managementState to Unmanaged unless you intend to manage KServe yourself"

rollback_order:
  - "oc patch $(oc get dsc -o name | head -1) --type merge -p '{\"spec\":{\"components\":{\"kserve\":{\"managementState\":\"Removed\"}}}}'"
