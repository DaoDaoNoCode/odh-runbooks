name: cluster-enable-pipelines
description: >
  Enable Data Science Pipelines (DSP) in the DataScienceCluster.
  DSP uses Kubeflow Pipelines + Argo Workflows, deployed per-project namespace
  for tenant isolation. After enabling, users create a pipeline server per project.
  HOW THE OPERATOR WORKS (opendatahub-operator):
  Patching managementState to 'Managed' in DSC is the ONLY action needed here.
  The opendatahub-operator automatically creates ALL child resources:
  Deployments, Services, ConfigMaps, CRDs, RBAC, Routes — everything.
  Do NOT manually create any of these — the operator manages them.
  Resources in the ODH namespace are created with opendatahub.io/managed absent
  (create-once behavior) unless explicitly marked managed=true (operator overwrites).
  To customize an operator-created resource: edit it directly — changes persist
  since resources are not continuously reconciled by default.
  Source: github.com/opendatahub-io/opendatahub-operator
rhoai_version_tested: null
confidence_overall: doc-derived

parameters: []

steps:
  - id: enable-dsp
    confidence: doc-derived
    description: Enable DataSciencePipelines component in DataScienceCluster
    requires:
      - type: dsc-exists
    pre_check:
      command: "oc get dsc -o jsonpath='{.items[0].spec.components.datasciencepipelines.managementState}'"
      expected: "Managed"
      if_already_true: skip
      on_fail: STOP
    action:
      type: patch
      target: "$(oc get dsc -o name | head -1)"
      patch: '{"spec":{"components":{"datasciencepipelines":{"managementState":"Managed"}}}}'
      dry_run: false
    post_check:
      command: "oc get dsc -o jsonpath='{.items[0].spec.components.datasciencepipelines.managementState}'"
      expected: "Managed"
      timeout: "30s"
      on_fail: STOP

  - id: wait-dsp-operator-ready
    confidence: doc-derived
    description: Wait for DataScienceCluster to finish reconciling DSP component
    action:
      type: wait
      command: "oc wait dsc --all --for=condition=Ready --timeout=300s 2>/dev/null || sleep 10"
    post_check:
      command: "oc get crd datasciencepipelinesapplications.datasciencepipelinesapplications.opendatahub.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "300s"
      poll_interval: "15s"
      on_fail: STOP

  - id: verify-dspa-crd
    confidence: doc-derived
    description: Verify DataSciencePipelinesApplication CRD is installed
    action:
      type: query
      command: "oc get crd datasciencepipelinesapplications.datasciencepipelinesapplications.opendatahub.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      store_as: crd_count
    post_check:
      command: "oc get crd datasciencepipelinesapplications.datasciencepipelinesapplications.opendatahub.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "30s"
      on_fail: STOP
    return: |
      ✓ Data Science Pipelines enabled.

      CRD: datasciencepipelinesapplications.opendatahub.io/v1alpha1
      Note: Each project needs its own pipeline server (DSPA CR).

      Next step: odh run pipelines/create-pipeline-server -p project_namespace=<ns> -p ...

  - id: verify-dashboard-config
    confidence: doc-derived
    description: >
      Verify OdhDashboardConfig shows pipelines in the dashboard.
      The dashboard checks disablePipelines — if true the Pipelines tab won't
      appear even with the DSP operator running.
    action:
      type: query
      command: |
        ODH_NS=$(oc get odhdashboardconfig --all-namespaces --no-headers -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || echo 'redhat-ods-applications')
        CFG=$(oc get odhdashboardconfig -n $ODH_NS -o name 2>/dev/null | head -1)
        if [ -z "$CFG" ]; then
          echo "ok: OdhDashboardConfig not found (older ODH version — skipping)"
          exit 0
        fi
        DIS=$(oc get odhdashboardconfig -n $ODH_NS -o jsonpath='{.spec.dashboardConfig.disablePipelines}' 2>/dev/null)
        if [ "$DIS" = "true" ]; then
          echo "Fixing: disablePipelines=true — patching to false"
          oc patch $CFG -n $ODH_NS --type merge \
            -p '{"spec":{"dashboardConfig":{"disablePipelines":false}}}'
        else
          echo "OK: disablePipelines is not true"
        fi
        echo "done"
      store_as: dashboard_flag_status
    post_check:
      command: |
        ODH_NS=$(oc get odhdashboardconfig --all-namespaces --no-headers -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || echo 'redhat-ods-applications')
        DIS=$(oc get odhdashboardconfig -n $ODH_NS -o jsonpath='{.spec.dashboardConfig.disablePipelines}' 2>/dev/null)
        [ "$DIS" != "true" ] && echo "ok" || echo "blocked"
      expected: "ok"
      timeout: "30s"
      on_fail: STOP
    on_fail_hint: >
      Pipelines are blocked in dashboard config. Fix: patch odhdashboardconfig --type merge -p '{"spec":{"dashboardConfig":{"disablePipelines":false}}}'

source_repos:
  - "https://github.com/opendatahub-io/data-science-pipelines-operator"
  - "https://github.com/opendatahub-io/argo-workflows"
  - "https://github.com/opendatahub-io/data-science-pipelines"
  - "https://github.com/opendatahub-io/opendatahub-operator"

known_bad_patterns:
  - "never assume the component shows in the dashboard just because the DSC component is Managed — also check OdhDashboardConfig feature flags (disable* = false, tech preview = true)"
  - "never create a DSPA without an S3 bucket configured — the pipeline server will fail to start"
  - "never share one DSPA across multiple projects — each project must have its own"
  - "never use the same S3 bucket for multiple DSPA instances without different prefixes"

rollback_order:
  - "oc patch $(oc get dsc -o name | head -1) --type merge -p '{\"spec\":{\"components\":{\"datasciencepipelines\":{\"managementState\":\"Removed\"}}}}'"
