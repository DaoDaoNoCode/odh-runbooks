name: cluster-enable-training-operator
description: >
  Enable the Kubeflow Training Operator in DataScienceCluster.
  Provides CRDs for: PyTorchJob, TFJob, XGBoostJob, MPIJob, JAXJob.
  Required for distributed model training from notebooks or pipelines.
  HOW THE OPERATOR WORKS (opendatahub-operator):
  Patching managementState to 'Managed' in DSC is the ONLY action needed here.
  The opendatahub-operator automatically creates ALL child resources:
  Deployments, Services, ConfigMaps, CRDs, RBAC, Routes — everything.
  Do NOT manually create any of these — the operator manages them.
  Resources in the ODH namespace are created with opendatahub.io/managed absent
  (create-once behavior) unless explicitly marked managed=true (operator overwrites).
  To customize an operator-created resource: edit it directly — changes persist
  since resources are not continuously reconciled by default.
  Source: github.com/opendatahub-io/opendatahub-operator
rhoai_version_tested: null
confidence_overall: doc-derived

parameters: []

steps:
  - id: enable-training-operator
    confidence: doc-derived
    description: Enable trainingOperator in DataScienceCluster
    requires:
      - type: dsc-exists
    pre_check:
      command: "oc get dsc -o jsonpath='{.items[0].spec.components.trainingoperator.managementState}'"
      expected: "Managed"
      if_already_true: skip
      on_fail: STOP
    action:
      type: patch
      target: "$(oc get dsc -o name | head -1)"
      patch: '{"spec":{"components":{"trainingoperator":{"managementState":"Managed"}}}}'
      dry_run: false
    post_check:
      command: "oc get dsc -o jsonpath='{.items[0].spec.components.trainingoperator.managementState}'"
      expected: "Managed"
      timeout: "30s"
      on_fail: STOP

  - id: wait-training-operator-ready
    confidence: doc-derived
    description: Wait for DataScienceCluster to reconcile Training Operator
    action:
      type: wait
      command: "oc wait dsc --all --for=condition=Ready --timeout=300s 2>/dev/null || sleep 10"
    post_check:
      command: "oc get crd pytorchjobs.kubeflow.org --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "300s"
      poll_interval: "15s"
      on_fail: STOP
    return: |
      ✓ Training Operator enabled.

      CRDs available:
        pytorchjobs.kubeflow.org    — Distributed PyTorch training
        tfjobs.kubeflow.org         — Distributed TensorFlow training
        xgboostjobs.kubeflow.org    — XGBoost training
        mpijobs.kubeflow.org        — MPI-based distributed training
        jaxjobs.kubeflow.org        — JAX training

      Next step: Submit a training job
        odh run model-training/submit-pytorch-job

  - id: enable-training-jobs-flag
    confidence: doc-derived
    description: >
      Enable trainingJobs tech preview flag in OdhDashboardConfig.
      Unlike disable* flags (default off), trainingJobs is a positive tech preview
      flag that must be explicitly set to true for the Training Jobs section to
      appear in the dashboard. Defaults to false/undefined if not set.
    action:
      type: query
      command: |
        ODH_NS=$(oc get odhdashboardconfig --all-namespaces --no-headers -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || echo 'redhat-ods-applications')
        CFG=$(oc get odhdashboardconfig -n $ODH_NS -o name 2>/dev/null | head -1)
        if [ -z "$CFG" ]; then
          echo "ok: OdhDashboardConfig not found — skipping"
          exit 0
        fi
        CURRENT=$(oc get odhdashboardconfig -n $ODH_NS \
          -o jsonpath='{.spec.dashboardConfig.trainingJobs}' 2>/dev/null)
        if [ "$CURRENT" != "true" ]; then
          echo "Enabling trainingJobs tech preview flag..."
          oc patch $CFG -n $ODH_NS --type merge \
            -p '{"spec":{"dashboardConfig":{{"trainingJobs":true}}}}'
          echo "Patched: trainingJobs=true"
        else
          echo "Already enabled: trainingJobs=true"
        fi
        echo "done"
      store_as: dashboard_flag_status
    post_check:
      command: |
        ODH_NS=$(oc get odhdashboardconfig --all-namespaces --no-headers -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || echo 'redhat-ods-applications')
        VAL=$(oc get odhdashboardconfig -n $ODH_NS \
          -o jsonpath='{.spec.dashboardConfig.trainingJobs}' 2>/dev/null)
        [ "$VAL" = "true" ] && echo "ok" || echo "not enabled"
      expected: "ok"
      timeout: "30s"
      on_fail: STOP
    on_fail_hint: >
      Could not enable trainingJobs flag in OdhDashboardConfig. Manual fix: oc patch $(oc get odhdashboardconfig -n redhat-ods-applications -o name | head -1) -n redhat-ods-applications --type merge -p '{"spec":{"dashboardConfig":{"trainingJobs":true}}}'

source_repos:
  - "https://github.com/kubeflow/training-operator"
  - "https://github.com/opendatahub-io/opendatahub-operator"

known_bad_patterns:
  - "never assume the component shows in the dashboard just because the DSC component is Managed — also check OdhDashboardConfig feature flags (disable* = false, tech preview = true)"
  - "never submit PyTorchJob without enabling the Training Operator first — the CRD won't exist"
  - "never use the training operator without disabling Istio sidecar injection in job pods"

rollback_order:
  - "oc patch $(oc get dsc -o name | head -1) --type merge -p '{\"spec\":{\"components\":{\"trainingoperator\":{\"managementState\":\"Removed\"}}}}'"
