name: evalhub-create-evaluation-run
description: >
  Enable TrustyAI + EvalHub and run a model evaluation.
  Returns the EvalHub dashboard URL on completion.

  DEFAULT BEHAVIOR (zero configuration beyond namespace):
  Automatically deploys granite-3.3-2b-instruct from Red Hat's public modelcar
  catalog using OCI format — no S3, no credentials, no model upload needed.
  Just pick your namespace and the rest runs automatically.

  MODEL CATALOG (all public, no auth — quay.io/redhat-ai-services/modelcar-catalog):
    granite-3.3-2b-instruct  5 GB    default, good accuracy for arc_easy
    llama-3.2-1b-instruct    2.5 GB  fastest deploy, minimal GPU memory
    granite-3.3-8b-instruct  16 GB   higher quality, needs more GPU memory
    qwen2.5-0.5b-instruct    1 GB    ultra-fast, minimal resources

  OVERRIDE OPTIONS (only if needed):
    model_catalog_tag:   pick a different model from the catalog above
    deployed_model_url:  use a model already running in your namespace

rhoai_version_tested: null
confidence_overall: inferred

parameters:
  - name: project_namespace
    description: OpenShift project namespace to use
    required: true
    discover_cmd: "oc get namespace -l opendatahub.io/dashboard=true --no-headers -o jsonpath='{.items[*].metadata.name}'"
    hint: "Must be an ODH Data Science Project"
    example: "my-data-science-project"

  - name: model_catalog_tag
    description: Model to deploy from Red Hat's public catalog (no S3 or credentials needed)
    required: false
    default: granite-3.3-2b-instruct
    enum:
      - granite-3.3-2b-instruct
      - llama-3.2-1b-instruct
      - granite-3.3-8b-instruct
      - qwen2.5-0.5b-instruct
      - granite-3.1-2b-instruct
      - llama-3.2-3b-instruct
    hint: >
      All from quay.io/redhat-ai-services/modelcar-catalog — public, no auth.
      Default granite-3.3-2b-instruct is a good balance of speed and quality.
      Use llama-3.2-1b-instruct for the fastest possible test run.

  - name: deployed_model_url
    description: URL of an already-deployed model — skips model deployment entirely
    required: false
    default: ""
    discover_cmd: "oc get inferenceservice -n {project_namespace} -o jsonpath='{range .items[*]}{.metadata.name}{\":\"}{.status.url}{\"\\n\"}{end}' 2>/dev/null"
    hint: "Leave empty to auto-deploy from catalog. Set this if you have a model already running."

  - name: model_name
    description: Name for the deployed model InferenceService
    required: false
    default: evalhub-model
    hint: "Lowercase letters, numbers, hyphens. Max 63 chars."

  - name: mlflow_experiment_name
    description: Name of the MLflow experiment
    required: false
    default: evalhub-evaluation

  - name: evalhub_instance_name
    description: Name of the EvalHub CR instance
    required: false
    default: evalhub-instance

  - name: benchmark_provider
    description: Benchmark provider for the evaluation run
    required: false
    default: lm-evaluation-harness
    enum: ["lm-evaluation-harness", "garak"]
    hint: "lm-evaluation-harness: accuracy benchmarks. garak: safety/red-teaming."

steps:

  # ── PHASE 1: Auto-provision all dependencies ──────────────────────────────

  - id: verify-dependencies
    confidence: doc-derived
    description: >
      Auto-resolve: DSC, namespace, TrustyAI, KServe.
      No S3 needed — default model comes from OCI catalog.
    requires:
      - type: dsc-exists
      - type: namespace
        name: "{{ project_namespace }}"
      - type: trustyai-enabled
      - type: kserve-enabled
    action:
      type: none
    post_check:
      command: "oc get crd trustyaiservices.trustyai.opendatahub.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "10s"
      on_fail: STOP

  # ── PHASE 2: Create EvalHub instance ─────────────────────────────────────

  - id: create-evalhub-cr
    confidence: doc-derived
    description: Create EvalHub CR in the project namespace
    pre_check:
      command: "oc get evalhub {{ evalhub_instance_name }} -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: create
      dry_run: true
      manifest: |
        apiVersion: trustyai.opendatahub.io/v1alpha1
        kind: EvalHub
        metadata:
          name: {{ evalhub_instance_name }}
          namespace: {{ project_namespace }}
        spec:
          replicas: 1
          providers:
            - lm-evaluation-harness
            - garak
          collections:
            - leaderboard-v2
            - safety-and-fairness-v1
          database:
            type: sqlite
    post_check:
      command: "oc get evalhub {{ evalhub_instance_name }} -n {{ project_namespace }} -o jsonpath='{.status.phase}' 2>/dev/null"
      expected: "Ready"
      timeout: "300s"
      poll_interval: "10s"
      on_fail: STOP
    rollback: "oc delete evalhub {{ evalhub_instance_name }} -n {{ project_namespace }}"

  - id: verify-evalhub-dashboard-visibility
    confidence: doc-derived
    description: >
      Verify EvalHub will appear in the dashboard. Three layers beyond DSC:

      1. OdhDashboardConfig.disableLMEval must be false (feature flag gate).
         Auto-fixes if blocked.

      2. federation-config ConfigMap must exist in the ODH namespace and contain
         an evalHub entry. This ConfigMap is created at dashboard install time as
         part of the modular-architecture kustomize overlay — NOT by the TrustyAI
         operator. The ConfigMap tells the dashboard backend to proxy /_mf/evalHub
         to the eval-hub-ui sidecar container on port 8543.

      3. The eval-hub-ui sidecar container must be running inside the dashboard pod.
         It is added to the dashboard Deployment by the modular-architecture overlay.
         Check: oc get deployment rhods-dashboard -n <odh-ns> -o jsonpath containers names.
    action:
      type: query
      command: |
        ODH_NS=$(oc get odhdashboardconfig --all-namespaces --no-headers \
          -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || echo 'redhat-ods-applications')
        CFG=$(oc get odhdashboardconfig -n $ODH_NS -o name 2>/dev/null | head -1)

        # --- Layer 2: OdhDashboardConfig flag ---
        if [ -n "$CFG" ]; then
          DIS=$(oc get odhdashboardconfig -n $ODH_NS \
            -o jsonpath='{.spec.dashboardConfig.disableLMEval}' 2>/dev/null)
          if [ "$DIS" = "true" ]; then
            echo "Fixing: disableLMEval=true — patching to false"
            oc patch $CFG -n $ODH_NS --type merge \
              -p '{"spec":{"dashboardConfig":{"disableLMEval":false}}}'
          else
            echo "OK: disableLMEval is not blocked"
          fi
        fi

        # --- Layer 4a: federation-config ConfigMap (dashboard install artefact) ---
        echo ""
        echo "=== federation-config ConfigMap (modular-architecture overlay) ==="
        if oc get configmap federation-config -n $ODH_NS 2>/dev/null | grep -q federation-config; then
          echo "OK: federation-config ConfigMap exists"
          EVAL_ENTRY=$(oc get configmap federation-config -n $ODH_NS \
            -o jsonpath='{.data.module-federation-config\.json}' 2>/dev/null | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print('found' if any(m.get('name')=='evalHub' for m in d) else 'missing')" 2>/dev/null)
          echo "evalHub entry in federation-config: $EVAL_ENTRY"
          if [ "$EVAL_ENTRY" != "found" ]; then
            echo "WARNING: evalHub not in federation-config — the modular-architecture"
            echo "  overlay was not applied when the dashboard was installed."
            echo "  This is a dashboard installation issue, not a TrustyAI issue."
          fi
        else
          echo "WARNING: federation-config ConfigMap not found in $ODH_NS"
          echo "  The modular-architecture kustomize overlay was not applied."
          echo "  EvalHub UI cannot load without this ConfigMap."
        fi

        # --- Layer 4b: eval-hub-ui sidecar in the dashboard pod ---
        echo ""
        echo "=== eval-hub-ui sidecar in dashboard Deployment ==="
        CONTAINERS=$(oc get deployment -n $ODH_NS -l app=rhods-dashboard \
          -o jsonpath='{.items[0].spec.template.spec.containers[*].name}' 2>/dev/null)
        if echo "$CONTAINERS" | grep -q "eval-hub"; then
          echo "OK: eval-hub-ui sidecar container is present in dashboard pod"
        else
          echo "WARNING: eval-hub-ui sidecar NOT in dashboard pod"
          echo "  Dashboard containers: $CONTAINERS"
          echo "  The modular-architecture overlay adds this sidecar."
          echo "  EvalHub UI cannot load without this container."
        fi

        echo "done"
      store_as: evalhub_visibility_status
    post_check:
      command: |
        ODH_NS=$(oc get odhdashboardconfig --all-namespaces --no-headers \
          -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || echo 'redhat-ods-applications')
        DIS=$(oc get odhdashboardconfig -n $ODH_NS \
          -o jsonpath='{.spec.dashboardConfig.disableLMEval}' 2>/dev/null)
        [ "$DIS" != "true" ] && echo "ok" || echo "blocked"
      expected: "ok"
      timeout: "30s"
      on_fail: STOP
    on_fail_hint: >
      If disableLMEval=true: auto-fixed above. If still blocked, manually patch OdhDashboardConfig.
      If federation-config ConfigMap is missing or has no evalHub entry: the modular-architecture
      kustomize overlay was not applied at dashboard install time. This is a dashboard installation
      issue — the eval-hub-ui sidecar container and federation-config ConfigMap must be present.
      Check with your ODH admin whether the modular-architecture overlay is enabled.
      If eval-hub-ui sidecar is missing from dashboard pod: same root cause — overlay not applied.
  - id: create-evalhub-rbac