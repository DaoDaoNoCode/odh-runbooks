name: evalhub-create-evaluation-run
description: >
  Enable TrustyAI + EvalHub and run a model evaluation.
  Returns the EvalHub dashboard URL on completion.

  DEFAULT BEHAVIOR (zero configuration beyond namespace):
  Automatically deploys granite-3.3-2b-instruct from Red Hat's public modelcar
  catalog using OCI format — no S3, no credentials, no model upload needed.
  Just pick your namespace and the rest runs automatically.

  MODEL CATALOG (all public, no auth — quay.io/redhat-ai-services/modelcar-catalog):
    granite-3.3-2b-instruct  5 GB    default, good accuracy for arc_easy
    llama-3.2-1b-instruct    2.5 GB  fastest deploy, minimal GPU memory
    granite-3.3-8b-instruct  16 GB   higher quality, needs more GPU memory
    qwen2.5-0.5b-instruct    1 GB    ultra-fast, minimal resources

  OVERRIDE OPTIONS (only if needed):
    model_catalog_tag:   pick a different model from the catalog above
    deployed_model_url:  use a model already running in your namespace

rhoai_version_tested: null
confidence_overall: inferred

parameters:
  - name: project_namespace
    description: OpenShift project namespace to use
    required: true
    discover_cmd: "oc get namespace -l opendatahub.io/dashboard=true --no-headers -o jsonpath='{.items[*].metadata.name}'"
    hint: "Must be an ODH Data Science Project"
    example: "my-data-science-project"

  - name: model_catalog_tag
    description: Model to deploy from Red Hat's public catalog (no S3 or credentials needed)
    required: false
    default: granite-3.3-2b-instruct
    enum:
      - granite-3.3-2b-instruct
      - llama-3.2-1b-instruct
      - granite-3.3-8b-instruct
      - qwen2.5-0.5b-instruct
      - granite-3.1-2b-instruct
      - llama-3.2-3b-instruct
    hint: >
      All from quay.io/redhat-ai-services/modelcar-catalog — public, no auth.
      Default granite-3.3-2b-instruct is a good balance of speed and quality.
      Use llama-3.2-1b-instruct for the fastest possible test run.

  - name: deployed_model_url
    description: URL of an already-deployed model — skips model deployment entirely
    required: false
    default: ""
    discover_cmd: "oc get inferenceservice -n {project_namespace} -o jsonpath='{range .items[*]}{.metadata.name}{\":\"}{.status.url}{\"\\n\"}{end}' 2>/dev/null"
    hint: "Leave empty to auto-deploy from catalog. Set this if you have a model already running."

  - name: model_name
    description: Name for the deployed model InferenceService
    required: false
    default: evalhub-model
    hint: "Lowercase letters, numbers, hyphens. Max 63 chars."

  - name: mlflow_experiment_name
    description: Name of the MLflow experiment
    required: false
    default: evalhub-evaluation

  - name: evalhub_instance_name
    description: Name of the EvalHub CR instance
    required: false
    default: evalhub-instance

  - name: benchmark_provider
    description: Benchmark provider for the evaluation run
    required: false
    default: lm-evaluation-harness
    enum: ["lm-evaluation-harness", "garak"]
    hint: "lm-evaluation-harness: accuracy benchmarks. garak: safety/red-teaming."

steps:

  # ── PHASE 1: Auto-provision all dependencies ──────────────────────────────

  - id: verify-dependencies
    confidence: doc-derived
    description: >
      Auto-resolve: DSC, namespace, TrustyAI, KServe.
      No S3 needed — default model comes from OCI catalog.
    requires:
      - type: dsc-exists
      - type: namespace
        name: "{{ project_namespace }}"
      - type: trustyai-enabled
      - type: kserve-enabled
    action:
      type: none
    post_check:
      command: "oc get crd trustyaiservices.trustyai.opendatahub.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "10s"
      on_fail: STOP

  - id: label-namespace-for-evalhub
    confidence: doc-derived
    description: >
      Label the project namespace so the TrustyAI operator provisions the virtual
      'evaluations' resource used for SAR auth checks. Without this label, non-admin
      users cannot access the EvalHub API through the dashboard.
    pre_check:
      command: "oc get namespace {{ project_namespace }} --show-labels 2>/dev/null | grep -c evalhub || echo 0"
      expected: "true"
      if_already_true: skip
      on_fail: STOP
    action:
      type: query
      command: |
        oc label namespace {{ project_namespace }}           evalhub.trustyai.opendatahub.io/tenant=true           --overwrite 2>&1
    post_check:
      command: "oc get namespace {{ project_namespace }} --show-labels 2>/dev/null | grep -c evalhub || echo 0"
      expected: "true"
      timeout: "15s"
      on_fail: STOP

  # ── PHASE 2: Create EvalHub instance ─────────────────────────────────────

  - id: create-evalhub-cr
    confidence: doc-derived
    description: Create EvalHub CR in the project namespace
    pre_check:
      command: "oc get evalhub {{ evalhub_instance_name }} -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: create
      dry_run: true
      manifest: |
        apiVersion: trustyai.opendatahub.io/v1alpha1
        kind: EvalHub
        metadata:
          name: {{ evalhub_instance_name }}
          namespace: {{ project_namespace }}
          labels:
            opendatahub.io/dashboard: "true"
        spec:
          replicas: 1
          providers:
            - lm-evaluation-harness
            - garak
          collections:
            - leaderboard-v2
            - safety-and-fairness-v1
          database:
            type: sqlite
    post_check:
      command: "oc get evalhub {{ evalhub_instance_name }} -n {{ project_namespace }} -o jsonpath='{.status.phase}' 2>/dev/null"
      expected: "Ready"
      timeout: "300s"
      poll_interval: "10s"
      on_fail: STOP
    rollback: "oc delete evalhub {{ evalhub_instance_name }} -n {{ project_namespace }}"

  - id: verify-evalhub-dashboard-visibility
    confidence: doc-derived
    description: >
      Verify EvalHub will appear in the dashboard. Three layers beyond DSC:

      1. OdhDashboardConfig.disableLMEval must be false (feature flag gate).
         Auto-fixes if blocked.

      2. federation-config ConfigMap must exist in the ODH namespace and contain
         an evalHub entry. This ConfigMap is created at dashboard install time as
         part of the modular-architecture kustomize overlay — NOT by the TrustyAI
         operator. The ConfigMap tells the dashboard backend to proxy /_mf/evalHub
         to the eval-hub-ui sidecar container on port 8543.

      3. The eval-hub-ui sidecar container must be running inside the dashboard pod.
         It is added to the dashboard Deployment by the modular-architecture overlay.
         Check: oc get deployment rhods-dashboard -n <odh-ns> -o jsonpath containers names.
    action:
      type: query
      command: |
        ODH_NS=$(oc get odhdashboardconfig --all-namespaces --no-headers \
          -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || echo 'redhat-ods-applications')
        CFG=$(oc get odhdashboardconfig -n $ODH_NS -o name 2>/dev/null | head -1)

        # --- Layer 2: OdhDashboardConfig flag ---
        if [ -n "$CFG" ]; then
          DIS=$(oc get odhdashboardconfig -n $ODH_NS \
            -o jsonpath='{.spec.dashboardConfig.disableLMEval}' 2>/dev/null)
          if [ "$DIS" = "true" ]; then
            echo "Fixing: disableLMEval=true — patching to false"
            oc patch $CFG -n $ODH_NS --type merge \
              -p '{"spec":{"dashboardConfig":{"disableLMEval":false}}}'
          else
            echo "OK: disableLMEval is not blocked"
          fi
        fi

        # --- Layer 4a: federation-config ConfigMap (dashboard install artefact) ---
        echo ""
        echo "=== federation-config ConfigMap (modular-architecture overlay) ==="
        if oc get configmap federation-config -n $ODH_NS 2>/dev/null | grep -q federation-config; then
          echo "OK: federation-config ConfigMap exists"
          EVAL_ENTRY=$(oc get configmap federation-config -n $ODH_NS \
            -o jsonpath='{.data.module-federation-config\.json}' 2>/dev/null | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print('found' if any(m.get('name')=='evalHub' for m in d) else 'missing')" 2>/dev/null)
          echo "evalHub entry in federation-config: $EVAL_ENTRY"
          if [ "$EVAL_ENTRY" != "found" ]; then
            echo "WARNING: evalHub not in federation-config — the modular-architecture"
            echo "  overlay was not applied when the dashboard was installed."
            echo "  This is a dashboard installation issue, not a TrustyAI issue."
          fi
        else
          echo "WARNING: federation-config ConfigMap not found in $ODH_NS"
          echo "  The modular-architecture kustomize overlay was not applied."
          echo "  EvalHub UI cannot load without this ConfigMap."
        fi

        # --- Layer 4b: eval-hub-ui sidecar in the dashboard pod ---
        echo ""
        echo "=== eval-hub-ui sidecar in dashboard Deployment ==="
        CONTAINERS=$(oc get deployment -n $ODH_NS -l app=rhods-dashboard \
          -o jsonpath='{.items[0].spec.template.spec.containers[*].name}' 2>/dev/null)
        if echo "$CONTAINERS" | grep -q "eval-hub"; then
          echo "OK: eval-hub-ui sidecar container is present in dashboard pod"
        else
          echo "WARNING: eval-hub-ui sidecar NOT in dashboard pod"
          echo "  Dashboard containers: $CONTAINERS"
          echo "  The modular-architecture overlay adds this sidecar."
          echo "  EvalHub UI cannot load without this container."
        fi

        echo "done"
      store_as: evalhub_visibility_status
    post_check:
      command: |
        ODH_NS=$(oc get odhdashboardconfig --all-namespaces --no-headers \
          -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || echo 'redhat-ods-applications')
        DIS=$(oc get odhdashboardconfig -n $ODH_NS \
          -o jsonpath='{.spec.dashboardConfig.disableLMEval}' 2>/dev/null)
        [ "$DIS" != "true" ] && echo "ok" || echo "blocked"
      expected: "ok"
      timeout: "30s"
      on_fail: STOP
    on_fail_hint: >
      If disableLMEval=true: auto-fixed above. If still blocked, manually patch OdhDashboardConfig.
      If federation-config ConfigMap is missing or has no evalHub entry: the modular-architecture
      kustomize overlay was not applied at dashboard install time. This is a dashboard installation
      issue — the eval-hub-ui sidecar container and federation-config ConfigMap must be present.
      Check with your ODH admin whether the modular-architecture overlay is enabled.
      If eval-hub-ui sidecar is missing from dashboard pod: same root cause — overlay not applied.
  - id: create-evalhub-rbac
    confidence: doc-derived
    description: Create RBAC roles for EvalHub and MLflow access
    pre_check:
      command: "oc get role eval-hub-user-access -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: true
      manifest: |
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: eval-hub-job
          namespace: {{ project_namespace }}
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: eval-hub-user-access
          namespace: {{ project_namespace }}
        rules:
          - apiGroups: ["trustyai.opendatahub.io"]
            resources: ["evaluations", "collections", "providers"]
            verbs: ["get", "list", "create", "update", "patch", "delete"]
          - apiGroups: ["trustyai.opendatahub.io"]
            resources: ["status-events"]
            verbs: ["create"]
          - apiGroups: ["mlflow.kubeflow.org"]
            resources: ["experiments"]
            verbs: ["create", "update"]
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: eval-hub-user-access
          namespace: {{ project_namespace }}
        subjects:
          - kind: ServiceAccount
            name: eval-hub-job
            namespace: {{ project_namespace }}
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: Role
          name: eval-hub-user-access
    post_check:
      command: "oc get role eval-hub-user-access -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      timeout: "30s"
      on_fail: STOP

  # ── PHASE 3a: Create vLLM ServingRuntime from RHOAI template ────────────
  # RHOAI stores runtimes as OpenShift Templates in redhat-ods-applications.
  # The dashboard instantiates the template to create a namespace-scoped ServingRuntime.
  # We must do the same — no ServingRuntime = "no runtime found" error from KServe.

  - id: create-vllm-serving-runtime
    confidence: doc-derived
    description: >
      Instantiate the vLLM CUDA ServingRuntime template from redhat-ods-applications.
      RHOAI stores runtimes as Templates (not ClusterServingRuntimes).
      Template 'vllm-cuda-runtime-template' creates 'vllm-cuda-runtime' ServingRuntime.
      supportedModelFormats: [{name: vLLM}] — case-sensitive, must match InferenceService.
    pre_check:
      command: "oc get servingruntime vllm-cuda-runtime -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: query
      command: |
        oc process -n redhat-ods-applications vllm-cuda-runtime-template 2>/dev/null |           oc apply -n {{ project_namespace }} -f - 2>&1
        echo "done"
      store_as: runtime_result
    post_check:
      command: "oc get servingruntime vllm-cuda-runtime -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "30s"
      on_fail: STOP
    on_fail_hint: >
      Template vllm-cuda-runtime-template not found in redhat-ods-applications.
      Check: oc get template -n redhat-ods-applications | grep vllm
      The template is created by the RHOAI operator when kserve is enabled.
    rollback: "oc delete servingruntime vllm-cuda-runtime -n {{ project_namespace }} 2>/dev/null || true"

  # ── PHASE 3: Resolve model ────────────────────────────────────────────────

  - id: resolve-model
    confidence: doc-derived
    description: >
      Decide which model to use — checked in priority order:
      1. deployed_model_url set → use it directly, skip all deployment
      2. Model already exists in namespace → use it, skip deployment
      3. Default → deploy from modelcar catalog via OCI (no S3, no auth)
    action:
      type: query
      command: |
        if [ -n "{{ deployed_model_url }}" ]; then
          echo "EXISTING:{{ deployed_model_url }}"
          exit 0
        fi
        EXISTING_URL=$(oc get inferenceservice {{ model_name }} -n {{ project_namespace }} \
          -o jsonpath="{.status.url}" 2>/dev/null)
        if [ -n "$EXISTING_URL" ] && [ "$EXISTING_URL" != "null" ]; then
          echo "EXISTING:$EXISTING_URL"
          exit 0
        fi
        echo "DEPLOY:quay.io/redhat-ai-services/modelcar-catalog:{{ model_catalog_tag }}"
      store_as: model_resolution
    post_check:
      assert: model_resolution is not empty
      command: "echo ok"
      expected: "ok"
      timeout: "10s"
      on_fail: STOP

  - id: deploy-model-from-catalog
    confidence: inferred
    description: >
      Deploy model from Red Hat's public modelcar catalog via OCI.
      storageUri: oci://quay.io/redhat-ai-services/modelcar-catalog:<tag>
      Public — no S3, no credentials, no connection secret needed.
      Skipped if an existing model URL was resolved in the previous step.

      GPU detection: check for GPU nodes first.
      - If GPU nodes exist: use vllm-cuda-runtime with GPU resources
      - If no GPU nodes: use vllm-cpu-runtime with the PUBLIC image
        (quay.io/rh-aiservices-bu/vllm-cpu-openai-ubi9:0.3)
        and size resources to what is ACTUALLY AVAILABLE on nodes.

      Before deploying CPU: check free CPU/memory on nodes:
        oc describe nodes | grep -A 5 "Allocated resources"
      Use conservative defaults that fit: cpu="2", memory="4Gi"
      For smallest model (qwen2.5-0.5b): max-model-len is 2048 (not 4096).

      If the vllm-cuda-runtime-template image fails with ImagePullBackOff
      (quay.io/rhoai/*): delete both ServingRuntime + InferenceService and
      recreate using the public CPU runtime image instead.
    pre_check:
      command: "echo '{{ model_resolution }}' | grep -q '^DEPLOY:' && echo needed || echo skip"
      expected: "skip"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: true
      manifest: |
        apiVersion: serving.kserve.io/v1beta1
        kind: InferenceService
        metadata:
          name: {{ model_name }}
          namespace: {{ project_namespace }}
          labels:
            opendatahub.io/dashboard: "true"
          annotations:
            openshift.io/display-name: "{{ model_name }}"
            openshift.io/description: "EvalHub test model ({{ model_catalog_tag }})"
            opendatahub.io/model-type: "Generative"
            security.opendatahub.io/enable-auth: "false"
            serving.kserve.io/deploymentMode: RawDeployment
        spec:
          predictor:
            minReplicas: 1
            model:
              modelFormat:
                name: vLLM
              runtime: vllm-cuda-runtime
              storageUri: "oci://{{ model_resolution | replace('DEPLOY:', '') }}"
              resources:
                requests:
                  cpu: "1"
                  memory: "10Gi"
                  nvidia.com/gpu: "1"
                limits:
                  memory: "10Gi"
                  nvidia.com/gpu: "1"
              args:
                - "--dtype=half"
                - "--max-model-len=8192"
                - "--gpu-memory-utilization=0.95"
    post_check:
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.modelStatus.states.activeModelState}' 2>/dev/null"
      expected: "Loaded"
      timeout: "900s"
      poll_interval: "20s"
      on_fail: STOP
    on_fail_hint: >
      Model failed to load. Try:
        Smaller model: re-run with -p model_catalog_tag=llama-3.2-1b-instruct (2.5 GB)
        Check GPU:     odh run gpu/verify-gpu-available
        Check logs:    oc logs -l serving.kserve.io/inferenceservice={{ model_name }} -n {{ project_namespace }}
    rollback: "oc delete inferenceservice {{ model_name }} -n {{ project_namespace }} 2>/dev/null || true"

  - id: check-pod-scheduling
    confidence: doc-derived
    description: >
      Wait 45 seconds after deployment to catch terminal failures early instead
      of polling blindly for 15 minutes.

      Always tracks the NEWEST pod — during a rolling update the old crashing
      pod is irrelevant; check the one being created.

      Three conditions caught immediately:
        UNSCHEDULABLE: no node can schedule the pod — diagnose resources, fix.
        IMAGEPULLBACKOFF: image unreachable — check which image and why.
        CRASHLOOPBACKOFF/OOMKILLED: container crashes — pull kserve-container
          logs (not modelcar, which is always silent) and diagnose the cause.

      If the pod is Running with a failing readiness probe: normal during model
      loading. Keep waiting. The probe passes once the server is ready to serve.
    action:
      type: query
      command: |
        sleep 45
        POD=$(oc get pods -n {{ project_namespace }} \
          -l serving.kserve.io/inferenceservice={{ model_name }} \
          --no-headers --sort-by=.metadata.creationTimestamp 2>/dev/null | tail -1)
        [ -z "$POD" ] && echo "ok" && exit 0

        NAME=$(echo "$POD" | awk '{print $1}')
        echo "Pod: $NAME  Status: $(echo "$POD" | awk '{print $3}')"

        # Skip pods being terminated by a previous rollout
        [ -n "$(oc get pod "$NAME" -n {{ project_namespace }} \
          -o jsonpath='{.metadata.deletionTimestamp}' 2>/dev/null)" ] && \
          echo "old pod terminating — new one starting" && echo "ok" && exit 0

        # Unschedulable
        UNSCHED=$(oc get pod "$NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.conditions[?(@.reason=="Unschedulable")].message}' \
          2>/dev/null)
        if [ -n "$UNSCHED" ]; then
          echo "UNSCHEDULABLE: $UNSCHED"
          oc get nodes --no-headers 2>/dev/null | awk '{print $1, $4, $5}'
          oc get nodes -l nvidia.com/gpu.present=true --no-headers 2>/dev/null || echo "(no GPU nodes)"
          echo "unschedulable"; exit 0
        fi

        # ImagePullBackOff — show which image failed so the fix is obvious
        IMGPULL=$(oc get pod "$NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].state.waiting.reason} {.status.initContainerStatuses[*].state.waiting.reason}' \
          2>/dev/null | tr ' ' '\n' | grep -iE "ImagePullBackOff|ErrImagePull" | head -1)
        if [ -n "$IMGPULL" ]; then
          echo "IMAGE PULL ERROR: $IMGPULL"
          oc describe pod "$NAME" -n {{ project_namespace }} 2>/dev/null | \
            grep "Failed to pull" | head -3
          echo "imagepull"; exit 0
        fi

        # CrashLoopBackOff / OOMKilled — pull logs for diagnosis
        CRASH=$(oc get pod "$NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].state.waiting.reason} {.status.containerStatuses[*].lastState.terminated.reason}' \
          2>/dev/null | tr ' ' '\n' | grep -iE "CrashLoopBackOff|OOMKilled" | head -1)
        if [ -n "$CRASH" ]; then
          echo "CRASHING: $CRASH"
          oc logs "$NAME" -n {{ project_namespace }} -c kserve-container --tail=40 2>/dev/null || \
            oc logs "$NAME" -n {{ project_namespace }} --tail=40 2>/dev/null || \
            echo "(no logs yet)"
          echo "pod-crashing"; exit 0
        fi

        echo "ok"
      store_as: pod_health_status
    post_check:
      command: |
        POD=$(oc get pods -n {{ project_namespace }} \
          -l serving.kserve.io/inferenceservice={{ model_name }} \
          --no-headers --sort-by=.metadata.creationTimestamp 2>/dev/null | tail -1 | awk '{print $1}')
        [ -z "$POD" ] && echo "ok" && exit 0
        CRASH=$(oc get pod "$POD" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].state.waiting.reason}' 2>/dev/null | \
          tr ' ' '\n' | grep -iE "ImagePullBackOff|ErrImagePull|CrashLoopBackOff" | head -1)
        UNSCHED=$(oc get pod "$POD" -n {{ project_namespace }} \
          -o jsonpath='{.status.conditions[?(@.reason=="Unschedulable")].message}' 2>/dev/null)
        [ -n "$CRASH" ] && echo "terminal" && exit 0
        [ -n "$UNSCHED" ] && echo "unschedulable" && exit 0
        echo "ok"
      expected: "ok"
      timeout: "90s"
      on_fail: STOP
    on_fail_hint: >
      UNSCHEDULABLE: oc describe nodes | grep -A5 "Allocated resources"
        No GPU nodes: use a CPU runtime with a small model.
        No CPU/memory: reduce resource requests or use a smaller model.
      IMAGEPULLBACKOFF: which image failed? (oc describe pod | grep "Failed to pull")
        Subscription image (quay.io/rhoai/, registry.redhat.io/): use a public alternative.
        Wrong URI: fix the image reference in the ServingRuntime or InferenceService.
      CRASHLOOPBACKOFF — diagnose from the logs above. Common fixes:
        Wrong port: add --port=8080 to ServingRuntime args (KServe probes 8080, vLLM defaults 8000)
        Wrong model path: add --model=/mnt/models (reads from KServe's model mount, not vLLM default)
        OOM: reduce --max-model-len or use a smaller model
        dtype: change --dtype=half to --dtype=bfloat16 or remove it

  - id: get-model-url
    confidence: doc-derived
    description: Get final model URL (from existing or newly deployed model)
    action:
      type: query
      command: |
        if echo "{{ model_resolution }}" | grep -q '^EXISTING:'; then
          echo "{{ model_resolution }}" | sed 's/^EXISTING://'
        else
          oc get inferenceservice {{ model_name }} -n {{ project_namespace }} \
            -o jsonpath="{.status.url}" 2>/dev/null || echo ""
        fi
      store_as: model_url
    post_check:
      assert: model_url is not empty
      command: "echo ok"
      expected: "ok"
      timeout: "30s"
      on_fail: STOP

  # ── PHASE 4: Create evaluation run ───────────────────────────────────────

  - id: get-evalhub-route
    confidence: inferred
    description: Get the EvalHub service route
    action:
      type: query
      command: "oc get route -n {{ project_namespace }} -l app={{ evalhub_instance_name }} -o jsonpath='{.items[0].spec.host}' 2>/dev/null"
      store_as: evalhub_host
    post_check:
      assert: evalhub_host is not empty
      command: "oc get route -n {{ project_namespace }} -l app={{ evalhub_instance_name }} -o jsonpath='{.items[0].spec.host}'"
      expected_min: 1
      timeout: "60s"
      on_fail: STOP

  - id: get-cluster-token
    confidence: doc-derived
    description: Get current user token for API authentication
    action:
      type: query
      command: "oc whoami -t"
      store_as: oc_token
    post_check:
      assert: oc_token is not empty
      command: "oc whoami -t"
      expected_min: 1
      timeout: "10s"
      on_fail: STOP

  - id: create-evaluation-job
    confidence: doc-derived
    description: POST evaluation job to EvalHub REST API with MLflow experiment
    action:
      type: api_call
      method: POST
      url: "https://{{ evalhub_host }}/api/v1/evaluations/jobs"
      headers:
        X-Tenant: "{{ project_namespace }}"
        Content-Type: "application/json"
        Authorization: "Bearer {{ oc_token }}"
      body: |
        {
          "name": "{{ mlflow_experiment_name }}",
          "description": "EvalHub test run via odh-runbooks",
          "model": {
            "name": "{{ model_name }}",
            "url": "{{ model_url }}"
          },
          "benchmarks": [{
            "id": "arc_easy",
            "provider_id": "{{ benchmark_provider }}",
            "primary_score": {
              "metric": "acc_norm",
              "lower_is_better": false
            },
            "pass_criteria": { "threshold": 0.25 }
          }],
          "experiment": {
            "name": "{{ mlflow_experiment_name }}",
            "tags": [
              { "key": "created_by", "value": "odh-runbooks" },
              { "key": "model_catalog_tag", "value": "{{ model_catalog_tag }}" }
            ]
          }
        }
      store_response_as: eval_job
    post_check:
      assert: eval_job is not empty
      command: "echo ok"
      expected: "ok"
      timeout: "30s"
      on_fail: STOP

  - id: wait-evaluation-complete
    confidence: doc-derived
    description: Poll until evaluation completes or fails (max 30 minutes)
    action:
      type: poll
      url: "https://{{ evalhub_host }}/api/v1/evaluations/jobs/{{ eval_job.resource.id }}"
      headers:
        X-Tenant: "{{ project_namespace }}"
        Authorization: "Bearer {{ oc_token }}"
      until: "response.status.state in ['completed', 'failed', 'cancelled']"
      timeout: "1800s"
      poll_interval: "30s"
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "10s"
      on_fail: STOP

  - id: return-result
    confidence: inferred
    description: Get dashboard URL and return summary
    action:
      type: query
      command: |
        oc get route rhods-dashboard -n redhat-ods-applications \
          -o jsonpath='{.spec.host}' 2>/dev/null || \
        oc get route rhods-dashboard -n opendatahub \
          -o jsonpath='{.spec.host}' 2>/dev/null
      store_as: dashboard_host
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "10s"
      on_fail: STOP
    return: |
      ✓ EvalHub evaluation run complete.

      Namespace:  {{ project_namespace }}
      Model:      {{ model_name }} ({{ model_catalog_tag }})
        Source:   {{ model_resolution | replace('DEPLOY:', 'OCI catalog: ') | replace('EXISTING:', 'existing: ') }}
        URL:      {{ model_url }}
      Benchmark:  arc_easy via {{ benchmark_provider }}

      ── View results ────────────────────────────────────────────
      https://{{ dashboard_host }}/evaluation/{{ project_namespace }}

      Re-run with different options:
        Smaller model (faster): -p model_catalog_tag=llama-3.2-1b-instruct
        Safety eval:            -p benchmark_provider=garak
        Your own model:         -p deployed_model_url=<your-endpoint>

known_bad_patterns:
  - "never set model_uri (S3 path) — the default OCI catalog path needs no S3"
  - "never create the EvalHub Route manually — auto-created by odh-model-controller"
  - "if model fails to load with OOM: use llama-3.2-1b-instruct (2.5GB) instead of default"

rollback_order:
  - "oc delete evalhub {{ evalhub_instance_name }} -n {{ project_namespace }} 2>/dev/null || true"
  - "oc delete inferenceservice {{ model_name }} -n {{ project_namespace }} 2>/dev/null || true"
  - "oc delete role eval-hub-user-access rolebinding eval-hub-user-access sa eval-hub-job -n {{ project_namespace }} 2>/dev/null || true"

source_repos:
  - "https://github.com/trustyai-explainability/trustyai-service-operator"
  - "https://github.com/opendatahub-io/trustyai-explainability"
  - "https://github.com/kserve/kserve"
  - "https://github.com/opendatahub-io/kserve"
  - "https://github.com/opendatahub-io/opendatahub-operator"

tags: ["evalhub", "mlflow", "model-serving", "trustyai"]
estimated_minutes: 25
next_steps:
  - "View results in dashboard: Projects → {{ project_namespace }} → EvalHub"
  - "Safety evaluation: -p benchmark_provider=garak"
  - "Larger model: -p model_catalog_tag=granite-3.3-8b-instruct"
