name: mlflow-register-model-from-run
description: >
  Register a model from an MLflow run into the MLflow Model Registry.
  Creates: RegisteredModel → ModelVersion linked to the run artifact.
  Stage transitions: None → Staging → Production → Archived.
  Uses MLflow's own registry (different from ODH Model Registry).
rhoai_version_tested: null
confidence_overall: doc-derived

parameters:
  - name: mlflow_tracking_uri
    description: MLflow server URL
    required: true
  - name: run_id
    description: MLflow run ID containing the model artifact
    required: true
  - name: model_name
    description: Name for the registered model
    required: true
  - name: artifact_path
    description: Path to model artifact within the run (e.g. 'model' or 'pytorch-model')
    required: false
    default: model
  - name: description
    description: Description of this model version
    required: false
    default: "Registered by ODH assistant"

steps:
  - id: create-registered-model
    confidence: doc-derived
    description: Create the top-level RegisteredModel entry (idempotent — skips if exists)
    action:
      type: api_call
      method: POST
      url: "{{ mlflow_tracking_uri }}/api/2.0/mlflow/registered-models/create"
      headers:
        Content-Type: "application/json"
      body: |
        {
          "name": "{{ model_name }}",
          "description": "{{ description }}",
          "tags": [
            {"key": "created_by", "value": "odh-assistant"}
          ]
        }
      store_response_as: registered_model
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "10s"
      on_fail: STOP

  - id: create-model-version
    confidence: doc-derived
    description: Create a model version from the run artifact
    action:
      type: api_call
      method: POST
      url: "{{ mlflow_tracking_uri }}/api/2.0/mlflow/model-versions/create"
      headers:
        Content-Type: "application/json"
      body: |
        {
          "name": "{{ model_name }}",
          "source": "runs:/{{ run_id }}/{{ artifact_path }}",
          "run_id": "{{ run_id }}",
          "description": "{{ description }}",
          "tags": [
            {"key": "run_id", "value": "{{ run_id }}"},
            {"key": "artifact_path", "value": "{{ artifact_path }}"}
          ]
        }
      store_response_as: model_version
    post_check:
      assert: model_version is not empty
      command: "echo ok"
      expected: "ok"
      timeout: "10s"
      on_fail: STOP

  - id: wait-version-ready
    confidence: doc-derived
    description: Poll until model version status is READY (artifact copy may take time)
    action:
      type: poll
      url: "{{ mlflow_tracking_uri }}/api/2.0/mlflow/model-versions/get?name={{ model_name }}&version={{ model_version.model_version.version }}"
      until: "response.model_version.status in ['READY', 'FAILED_REGISTRATION']"
      timeout: "300s"
      poll_interval: "10s"
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "10s"
      on_fail: STOP

  - id: transition-to-staging
    confidence: doc-derived
    description: Move model version to Staging stage for testing
    action:
      type: api_call
      method: POST
      url: "{{ mlflow_tracking_uri }}/api/2.0/mlflow/model-versions/transition-stage"
      headers:
        Content-Type: "application/json"
      body: |
        {
          "name": "{{ model_name }}",
          "version": "{{ model_version.model_version.version }}",
          "stage": "Staging",
          "archive_existing_versions": false
        }
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "10s"
      on_fail: STOP
    return: |
      ✓ Model registered in MLflow Model Registry.

      Model Name:  {{ model_name }}
      Version:     {{ model_version.model_version.version }}
      Stage:       Staging
      Source:      runs:/{{ run_id }}/{{ artifact_path }}

      MLflow UI:   {{ mlflow_tracking_uri }}/#/models/{{ model_name }}

      Python equivalent:
        import mlflow
        mlflow.set_tracking_uri("{{ mlflow_tracking_uri }}")
        client = mlflow.tracking.MlflowClient()
        result = client.create_model_version(
            name="{{ model_name }}",
            source="runs:/{{ run_id }}/{{ artifact_path }}",
            run_id="{{ run_id }}"
        )
        client.transition_model_version_stage("{{ model_name }}", result.version, "Staging")

      Next step: Promote to production
        odh run mlflow/promote-model-to-production -p model_name={{ model_name }} -p version={{ model_version.model_version.version }}

source_repos:
  - "https://github.com/opendatahub-io/mlflow"
  - "https://github.com/mlflow/mlflow"
  - "https://github.com/kubeflow/model-registry"
  - "https://github.com/opendatahub-io/odh-dashboard"

known_bad_patterns:
  - "never delete a model version in Production stage — archive it first"
  - "never transition to Production without first validating in Staging"
  - "never use archive_existing_versions=true without understanding which versions will be archived"
  - "never create a model version from an artifact path that doesn't exist in the run — the version stays in PENDING_REGISTRATION forever"

rollback_order:
  - "POST {{ mlflow_tracking_uri }}/api/2.0/mlflow/model-versions/delete with name={{ model_name }}&version={{ model_version.model_version.version }}"
