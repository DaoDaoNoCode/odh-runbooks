name: model-registry-deploy-from-registry
description: >
  Deploy a model from the Model Registry to KServe InferenceService.
  This is the correct user flow — register first, then deploy from registry.

  HOW MODEL REGISTRY LINKING WORKS (from odh-model-controller source):
  The odh-model-controller's ModelRegistryInferenceServiceReconciler watches
  InferenceServices and links them to the model registry by setting labels:
    modelregistry.opendatahub.io/model-version-id
    modelregistry.opendatahub.io/registered-model-id
    modelregistry.opendatahub.io/inference-service-id
    modelregistry.opendatahub.io/name
    modelregistry.opendatahub.io/namespace

  These must be set as LABELS (not annotations) using the correct prefix
  'modelregistry.opendatahub.io/' (NOT 'model-registry/').

  WHAT THE CONTROLLER AUTO-CREATES (do not create manually):
  - OpenShift Route — auto-created by odh-model-controller when IS is created
  - ServiceMonitor/PodMonitor — auto-created for Prometheus metrics
  - ClusterRoleBinding — auto-created when security.opendatahub.io/enable-auth=true

  Routes are created automatically, so status.url is populated without
  any manual Route creation.
rhoai_version_tested: null
confidence_overall: doc-derived

parameters:
  - name: registry_name
    description: Model registry instance name
    required: false
    default: model-registry
    discover_cmd: "oc get modelregistry -n odh-model-registries --no-headers -o jsonpath='{.items[*].metadata.name}' 2>/dev/null"
  - name: registry_namespace
    description: Model registry namespace
    required: false
    default: odh-model-registries
  - name: model_version_id
    description: Model version ID from the registry (from register-model output)
    required: true
    hint: "Get from: odh run model-registry/register-model output, or model registry dashboard"
    example: "42"
  - name: project_namespace
    description: Target project namespace to deploy into
    required: true
    discover_cmd: "oc get namespace -l opendatahub.io/dashboard=true --no-headers -o jsonpath='{.items[*].metadata.name}'"
  - name: inference_service_name
    description: Name for the InferenceService
    required: true
    example: "my-model-from-registry"
    hint: "Lowercase letters, numbers, hyphens. Max 63 chars."
  - name: s3_connection_name
    description: S3 connection secret in the target project
    required: true
    discover_cmd: "oc get secret -n {project_namespace} -l opendatahub.io/connection-type=s3 --no-headers -o jsonpath='{.items[*].metadata.name}' 2>/dev/null"
  - name: model_format
    description: Model format name
    required: false
    default: vllm
    enum: ["vllm", "openvino_ir", "onnx", "sklearn", "xgboost", "pytorch"]
  - name: model_type
    description: "Model type: Predictive or Generative"
    required: false
    default: Generative
    enum: ["Predictive", "Generative"]

steps:
  - id: get-registry-token
    confidence: doc-derived
    description: Get auth token for registry API
    requires:
      - type: model-registry-instance
      - type: kserve-enabled
      - type: namespace
        name: "{{ project_namespace }}"
      - type: s3-connection
        namespace: "{{ project_namespace }}"
    action:
      type: query
      command: "oc whoami -t"
      store_as: oc_token
    post_check:
      assert: oc_token is not empty
      command: "oc whoami -t"
      expected_min: 1
      timeout: "10s"
      on_fail: STOP

  - id: get-registry-url
    confidence: doc-derived
    description: Get model registry REST API URL
    action:
      type: query
      command: "oc get route {{ registry_name }}-rest -n {{ registry_namespace }} -o jsonpath='{.spec.host}' 2>/dev/null"
      store_as: registry_host
    post_check:
      assert: registry_host is not empty
      command: "oc get route {{ registry_name }}-rest -n {{ registry_namespace }} -o jsonpath='{.spec.host}'"
      expected_min: 1
      timeout: "10s"
      on_fail: STOP

  - id: fetch-model-version
    confidence: doc-derived
    description: Fetch model version metadata from registry
    action:
      type: api_call
      method: GET
      url: "https://{{ registry_host }}/api/model_registry/v1alpha3/model_versions/{{ model_version_id }}"
      headers:
        Authorization: "Bearer {{ oc_token }}"
      store_response_as: model_version
    post_check:
      assert: model_version is not empty
      command: "echo ok"
      expected: "ok"
      timeout: "10s"
      on_fail: STOP

  - id: fetch-model-artifact
    confidence: doc-derived
    description: Fetch artifact to get model storage URI
    action:
      type: api_call
      method: GET
      url: "https://{{ registry_host }}/api/model_registry/v1alpha3/model_versions/{{ model_version_id }}/artifacts"
      headers:
        Authorization: "Bearer {{ oc_token }}"
      store_response_as: artifacts_response
    post_check:
      assert: artifacts_response is not empty
      command: "echo ok"
      expected: "ok"
      timeout: "10s"
      on_fail: STOP

  - id: deploy-inference-service
    confidence: doc-derived
    description: >
      Create InferenceService with CORRECT model registry linking labels.
      From odh-model-controller source (ModelRegistryInferenceServiceReconciler):
      - Labels use prefix 'modelregistry.opendatahub.io/' (NOT 'model-registry/')
      - These are LABELS on metadata, NOT annotations
      - model-type annotation is REQUIRED (Generative|Predictive)
      - connections/connection-path annotations are REQUIRED
      - The controller auto-creates: Route, ServiceMonitor, PodMonitor
      - Do NOT create Route manually — status.url is populated automatically
    pre_check:
      command: "oc get inferenceservice {{ inference_service_name }} -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: true
      manifest: |
        apiVersion: serving.kserve.io/v1beta1
        kind: InferenceService
        metadata:
          name: {{ inference_service_name }}
          namespace: {{ project_namespace }}
          labels:
            opendatahub.io/dashboard: "true"
            modelregistry.opendatahub.io/model-version-id: "{{ model_version_id }}"
            modelregistry.opendatahub.io/registered-model-id: "{{ model_version.registeredModelId }}"
            modelregistry.opendatahub.io/name: "{{ registry_name }}"
            modelregistry.opendatahub.io/namespace: "{{ registry_namespace }}"
          annotations:
            openshift.io/display-name: "{{ inference_service_name }}"
            openshift.io/description: ""
            opendatahub.io/model-type: "{{ model_type }}"
            opendatahub.io/connections: "{{ s3_connection_name }}"
            opendatahub.io/connection-path: "{{ artifacts_response.items[0].uri }}"
            security.opendatahub.io/enable-auth: "false"
            serving.kserve.io/deploymentMode: RawDeployment
        spec:
          predictor:
            minReplicas: 1
            model:
              modelFormat:
                name: {{ model_format }}
              storage:
                key: {{ s3_connection_name }}
                path: "{{ artifacts_response.items[0].uri }}"
    post_check:
      command: "oc get inferenceservice {{ inference_service_name }} -n {{ project_namespace }} -o jsonpath='{.status.modelStatus.states.activeModelState}'"
      expected: "Loaded"
      timeout: "600s"
      poll_interval: "20s"
      on_fail: STOP
    rollback: "oc delete inferenceservice {{ inference_service_name }} -n {{ project_namespace }}"

  - id: get-endpoint-url
    confidence: doc-derived
    description: >
      Get the model endpoint from status.url.
      The OpenShift Route is auto-created by odh-model-controller — do NOT create it manually.
      status.url is populated automatically once the Route is ready.
    action:
      type: query
      command: "oc get inferenceservice {{ inference_service_name }} -n {{ project_namespace }} -o jsonpath='{.status.url}'"
      store_as: model_url
    post_check:
      assert: model_url is not empty
      command: "oc get inferenceservice {{ inference_service_name }} -n {{ project_namespace }} -o jsonpath='{.status.url}'"
      expected_min: 1
      timeout: "60s"
      on_fail: STOP
    return: |
      ✓ Model deployed from registry.

      Registry version:  {{ model_version_id }}
      InferenceService:  {{ inference_service_name }}
      Model type:        {{ model_type }}
      Endpoint:          {{ model_url }}

      Registry labels set (modelregistry.opendatahub.io/*):
        model-version-id:    {{ model_version_id }}
        registered-model-id: {{ model_version.registeredModelId }}
        name:                {{ registry_name }}
        namespace:           {{ registry_namespace }}

      Dashboard: Projects → {{ project_namespace }} → Models and model servers
      Model Registry: shows this deployment linked to version {{ model_version_id }}

      Auto-created by odh-model-controller (do not create manually):
        ✓ OpenShift Route
        ✓ ServiceMonitor (Prometheus)
        ✓ PodMonitor

known_bad_patterns:
  - "CRITICAL: model registry labels must use prefix 'modelregistry.opendatahub.io/' not 'model-registry/'"
  - "CRITICAL: model registry links must be LABELS not annotations — wrong type means the controller won't recognize them"
  - "CRITICAL: never manually create an OpenShift Route — odh-model-controller creates it automatically"
  - "never create ServiceMonitor or PodMonitor manually — auto-created by odh-model-controller"
  - "never set security.opendatahub.io/enable-auth=true without understanding that it triggers automatic ClusterRoleBinding creation"

rollback_order:
  - "oc delete inferenceservice {{ inference_service_name }} -n {{ project_namespace }}"
