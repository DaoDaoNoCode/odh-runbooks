name: model-serving-canary-deployment
description: >
  Deploy a new model version with traffic splitting (canary rollout).
  Uses KServe canaryTrafficPercent to route X% of traffic to new version.
  Requires tag-based routing annotation for separate canary/stable endpoints.
  Gradually increase canaryTrafficPercent from 10% → 50% → 100% as confidence grows.
rhoai_version_tested: null
confidence_overall: doc-derived

parameters:
  - name: project_namespace
    description: Project namespace
    required: true
  - name: model_name
    description: Name of the existing InferenceService (stable version)
    required: true
  - name: new_model_uri
    description: S3 URI for the new model version to canary
    required: true
  - name: s3_connection_name
    description: S3 connection secret name
    required: true
  - name: canary_traffic_percent
    description: Percentage of traffic to route to new version (0-100)
    required: false
    default: "10"
  - name: model_format
    description: Model format (must match existing deployment)
    required: false
    default: vllm

steps:
  - id: verify-existing-model-loaded
    confidence: doc-derived
    description: Verify the existing model InferenceService is healthy before canary
    requires:
      - type: kserve-enabled
      - type: namespace
        name: "{{ project_namespace }}"
      - type: s3-connection
        namespace: "{{ project_namespace }}"
    pre_check:
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.modelStatus.states.activeModelState}'"
      expected: "Loaded"
      on_fail: STOP
    action:
      type: none
    post_check:
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.modelStatus.states.activeModelState}'"
      expected: "Loaded"
      timeout: "10s"
      on_fail: STOP

  - id: apply-canary-traffic-split
    confidence: doc-derived
    description: Update InferenceService with new model URI and canary traffic split
    action:
      type: apply
      dry_run: true
      manifest: |
        apiVersion: serving.kserve.io/v1beta1
        kind: InferenceService
        metadata:
          name: {{ model_name }}
          namespace: {{ project_namespace }}
          labels:
            opendatahub.io/dashboard: "true"
          annotations:
            openshift.io/display-name: "{{ model_name }}"
            openshift.io/description: ""
            opendatahub.io/model-type: "Generative"
            opendatahub.io/connections: "{{ s3_connection_name }}"
            opendatahub.io/connection-path: "{{ new_model_uri }}"
            security.opendatahub.io/enable-auth: "false"
            serving.kserve.io/deploymentMode: RawDeployment
            serving.kserve.io/enable-tag-routing: "true"
        spec:
          predictor:
            canaryTrafficPercent: {{ canary_traffic_percent }}
            minReplicas: 1
            model:
              modelFormat:
                name: {{ model_format }}
              storage:
                key: {{ s3_connection_name }}
                path: "{{ new_model_uri }}"
    post_check:
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.spec.predictor.canaryTrafficPercent}'"
      expected: "{{ canary_traffic_percent }}"
      timeout: "60s"
      on_fail: STOP

  - id: wait-canary-model-loaded
    confidence: doc-derived
    description: Wait for new canary model to load (trafficStatus shows both stable and canary)
    action:
      type: wait
      command: "oc wait inferenceservice {{ model_name }} -n {{ project_namespace }} --for=condition=Ready --timeout=600s"
    post_check:
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.modelStatus.states.activeModelState}'"
      expected: "Loaded"
      timeout: "600s"
      poll_interval: "20s"
      on_fail: STOP

  - id: verify-traffic-split
    confidence: doc-derived
    description: Verify traffic split is active and both endpoints respond
    action:
      type: query
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.trafficStatus}'"
      store_as: traffic_status
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "10s"
      on_fail: STOP
    return: |
      ✓ Canary deployment active.

      Model:           {{ model_name }}
      Canary traffic:  {{ canary_traffic_percent }}%
      Stable traffic:  {{ 100 - canary_traffic_percent | int }}%
      New model URI:   {{ new_model_uri }}

      Traffic status: {{ traffic_status }}

      Monitor for errors, then increase traffic:
        # Increase to 50%:
        odh run model-serving/canary-deployment \
          -p model_name={{ model_name }} \
          -p new_model_uri={{ new_model_uri }} \
          -p canary_traffic_percent=50

        # Promote to 100% (full rollout):
        odh run model-serving/canary-deployment \
          -p model_name={{ model_name }} \
          -p new_model_uri={{ new_model_uri }} \
          -p canary_traffic_percent=100

        # Rollback to stable (0% canary):
        oc patch inferenceservice {{ model_name }} -n {{ project_namespace }} \
          --type merge -p '{"spec":{"predictor":{"canaryTrafficPercent":0}}}'

known_bad_patterns:
  - "never go directly to 100% without testing at 10% first — you cannot quickly rollback a full rollout"
  - "never canary a model with a different API schema — the traffic split will cause inconsistent responses"
  - "never remove canaryTrafficPercent without setting it to 0 first — the field must be explicitly zeroed to roll back"
  - "never use Serverless mode for canary without Service Mesh — tag-based routing requires Istio"

rollback_order:
  - "oc patch inferenceservice {{ model_name }} -n {{ project_namespace }} --type merge -p '{\"spec\":{\"predictor\":{\"canaryTrafficPercent\":0}}}'"
