name: model-serving-deploy-kserve-model
description: >
  Deploy a model using KServe InferenceService in RawDeployment mode.
  Matches EXACTLY what the ODH dashboard creates:
  - Label: opendatahub.io/dashboard=true (required for dashboard listing)
  - Annotation: openshift.io/display-name (required, dashboard always sets it)
  - Annotation: serving.kserve.io/deploymentMode=RawDeployment (dashboard only supports RawDeployment)
  - Storage: uses storage.key/path (NOT storageUri) when using an ODH S3 connection
  - Dashboard only supports RawDeployment — Serverless is not available in dashboard UI
rhoai_version_tested: null
confidence_overall: doc-derived

parameters:
  - name: project_namespace
    description: Project namespace
    required: true
  - name: model_name
    description: Name for the InferenceService (lowercase, hyphens, max 63 chars)
    required: true
  - name: model_format
    description: "Model format name: vllm | openvino_ir | onnx | sklearn | xgboost | pytorch | tensorflow"
    required: true
  - name: model_uri
    description: "Path within the S3 bucket to the model (e.g. models/my-model)"
    required: true
  - name: s3_connection_name
    description: Name of the S3 connection secret in the project
    required: true
  - name: cpu_request
    description: CPU request
    required: false
    default: "1"
  - name: memory_request
    description: Memory request
    required: false
    default: "4Gi"
  - name: min_replicas
    description: Minimum replicas
    required: false
    default: "1"

steps:
  - id: check-kserve-enabled
    confidence: doc-derived
    description: Verify KServe is enabled and S3 connection exists
    requires:
      - type: kserve-enabled
      - type: namespace
        name: "{{ project_namespace }}"
      - type: s3-connection
        namespace: "{{ project_namespace }}"
    pre_check:
      command: "oc get crd inferenceservices.serving.kserve.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      on_fail: STOP
    action:
      type: none
    post_check:
      command: "oc get crd inferenceservices.serving.kserve.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "10s"
      on_fail: STOP

  - id: create-inference-service
    confidence: doc-derived
    description: >
      Create KServe InferenceService matching EXACTLY what the dashboard creates.
      Uses storage.key/path (not storageUri) for S3 connection-based deployment.
      Dashboard always sets RawDeployment mode and openshift.io/display-name annotation.
      Model registry labels added so dashboard can link back to registry if needed.
    pre_check:
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: true
      manifest: |
        apiVersion: serving.kserve.io/v1beta1
        kind: InferenceService
        metadata:
          name: {{ model_name }}
          namespace: {{ project_namespace }}
          labels:
            opendatahub.io/dashboard: "true"
          annotations:
            openshift.io/display-name: "{{ model_name }}"
            serving.kserve.io/deploymentMode: RawDeployment
        spec:
          predictor:
            minReplicas: {{ min_replicas }}
            model:
              modelFormat:
                name: {{ model_format }}
              resources:
                requests:
                  cpu: "{{ cpu_request }}"
                  memory: "{{ memory_request }}"
                limits:
                  cpu: "{{ cpu_request }}"
                  memory: "{{ memory_request }}"
              storage:
                key: {{ s3_connection_name }}
                path: "{{ model_uri }}"
    post_check:
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.modelStatus.states.activeModelState}'"
      expected: "Loaded"
      timeout: "600s"
      poll_interval: "20s"
      on_fail: STOP
    rollback: "oc delete inferenceservice {{ model_name }} -n {{ project_namespace }}"

  - id: get-model-url
    confidence: doc-derived
    description: Retrieve the model inference endpoint URL from status
    action:
      type: query
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.url}'"
      store_as: model_url
    post_check:
      assert: model_url is not empty
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.url}'"
      expected_min: 1
      timeout: "30s"
      on_fail: STOP
    return: |
      ✓ Model deployed: {{ model_name }}

      Format:   {{ model_format }}
      Endpoint: {{ model_url }}

      Dashboard: Projects → {{ project_namespace }} → Models and model servers → {{ model_name }}

      Test:
        curl -X POST {{ model_url }}/v2/models/{{ model_name }}/infer \
          -H "Content-Type: application/json" \
          -d '{"inputs": [{"name": "input", "shape": [1], "datatype": "FP32", "data": [1.0]}]}'

      Notes:
        - storage.key = name of the ODH S3 connection secret
        - storage.path = path within the bucket (not full s3:// URI)
        - storageUri would be used if NOT using an ODH connection secret

known_bad_patterns:
  - "CRITICAL: never omit openshift.io/display-name annotation — dashboard reads it to show model name"
  - "CRITICAL: never omit opendatahub.io/dashboard=true label — model won't appear in dashboard"
  - "CRITICAL: never use Serverless deploymentMode — dashboard only supports RawDeployment"
  - "never use both storageUri AND storage.key/path — they are mutually exclusive; dashboard deletes one when setting the other"
  - "never omit serving.kserve.io/deploymentMode: RawDeployment — without it KServe may try Serverless mode"

rollback_order:
  - "oc delete inferenceservice {{ model_name }} -n {{ project_namespace }}"
