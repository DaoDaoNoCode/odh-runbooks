name: model-serving-deploy-llmd-model
description: >
  Deploy an LLM using LLM-D (LLMInferenceService CRD) for optimized distributed inference.
  SOURCE: packages/llmd-serving in odh-dashboard.

  CRITICAL DISTINCTION from standard KServe:
  LLM-D uses a COMPLETELY DIFFERENT CRD — NOT InferenceService (v1beta1).
  It uses: serving.kserve.io/v1alpha1 LLMInferenceService

  Key differences from standard KServe deploy-vllm-model:
  - CRD: LLMInferenceService (not InferenceService)
  - Model spec: spec.model.uri (not spec.predictor.model.storage)
  - Routing: spec.router.gateway (Gateway-based, not IngressClass)
  - Auth: ENABLED BY DEFAULT (not disabled like standard KServe)
  - Auth creates RBAC: Role + ServiceAccount + RoleBinding + Secret
  - Pod label: app.kubernetes.io/component=llminferenceservice-workload
  - No external route option (disabled in llmd-serving package)
  - No deployment strategy option (disabled in llmd-serving package)

  LLM-D provides prefix-cache-aware routing and queue-aware load balancing
  across multiple vLLM pods for better latency at scale.

  PREREQUISITE: An LLM-D Gateway must exist in the cluster.
  The llm-d-inference-scheduler must be deployed separately.
rhoai_version_tested: null
confidence_overall: inferred

parameters:
  - name: project_namespace
    description: Namespace to deploy the LLMInferenceService into
    required: true
    discover_cmd: "oc get namespace -l opendatahub.io/dashboard=true --no-headers -o jsonpath='{.items[*].metadata.name}'"
    hint: "Must be an ODH Data Science Project"
    example: "llm-serving"
  - name: model_name
    description: Name for the LLMInferenceService
    required: true
    example: "llama3-8b-llmd"
    hint: "Lowercase letters, numbers, hyphens. Max 63 chars."
  - name: model_uri
    description: "Model URI — can be HuggingFace hub ID or S3 path"
    required: true
    example: "Qwen/Qwen2.5-7B-Instruct"
    hint: "HuggingFace model ID (ungated models work without HF token) or s3://bucket/path"
  - name: gateway_name
    description: Name of the LLM-D Gateway to route through
    required: true
    discover_cmd: "oc get gateway -A --no-headers -o jsonpath='{range .items[*]}{.metadata.name}{\" \"}{.metadata.namespace}{\"\\n\"}{end}' 2>/dev/null"
    hint: "Must be an existing Gateway resource. Deploy llm-d-inference-scheduler first."
    example: "llm-d-gateway"
  - name: gateway_namespace
    description: Namespace where the Gateway lives
    required: false
    default: "{{ project_namespace }}"
  - name: gpu_count
    description: Number of GPUs per replica
    required: false
    default: "1"
    enum: ["1", "2", "4", "8"]
  - name: memory_request
    description: Memory request per pod
    required: false
    default: "24Gi"
  - name: num_replicas
    description: "Number of vLLM replicas (>1 activates LLM-D scheduling intelligence)"
    required: false
    default: "2"
    hint: "LLM-D's routing intelligence only activates with >= 2 replicas"
  - name: hf_token_secret
    description: "Kubernetes secret name containing HF_TOKEN (required for gated models like Llama)"
    required: false
    default: ""
    hint: "Leave empty for ungated models (Qwen, Mistral, etc.). Create with: oc create secret generic hf-token --from-literal=HF_TOKEN=hf_xxx"

steps:
  - id: check-prerequisites
    confidence: inferred
    description: Verify LLMInferenceService CRD exists (llm-d-inference-scheduler must be deployed)
    requires:
      - type: openshift-cluster
      - type: gpu-available
        can_auto_resolve: false
        blocker_message: "LLM-D requires GPU nodes. Run: odh run rosa/setup-gpu-machinepool"
      - type: namespace
        name: "{{ project_namespace }}"
    pre_check:
      command: "oc get crd llminferenceservices.serving.kserve.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      on_fail: STOP
    action:
      type: none
    post_check:
      command: "oc get crd llminferenceservices.serving.kserve.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "10s"
      on_fail: STOP
    on_fail_hint: >
      LLMInferenceService CRD not found. The llm-d-inference-scheduler must be deployed first.
      This is typically deployed via the ODH operator with llmd-serving component enabled,
      or via Helmfile from the llm-d-inference-scheduler repo.

  - id: check-gateway-exists
    confidence: inferred
    description: Verify the specified Gateway exists
    pre_check:
      command: "oc get gateway {{ gateway_name }} -n {{ gateway_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      on_fail: STOP
    action:
      type: none
    post_check:
      command: "oc get gateway {{ gateway_name }} -n {{ gateway_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "10s"
      on_fail: STOP
    on_fail_hint: >
      Gateway not found. List available gateways with:
        oc get gateway -A
      The llm-d-inference-scheduler deploys gateways automatically.
      Check its deployment status first.

  - id: create-llm-inference-service
    confidence: inferred
    description: >
      Create LLMInferenceService — the LLM-D CRD (NOT standard KServe InferenceService).
      From packages/llmd-serving dashboard source:
      - apiVersion: serving.kserve.io/v1alpha1 (NOT v1beta1)
      - spec.model.uri: direct model reference
      - spec.router.gateway: Gateway-based routing (not Ingress)
      - spec.replicas: number of vLLM pods
      - Labels: dashboard.opendatahub.io/dashboard-resource=true (note: different from standard!)
      - Auth enabled by default in llmd-serving package
      - Pod label: app.kubernetes.io/component=llminferenceservice-workload
    pre_check:
      command: "oc get llminferenceservice {{ model_name }} -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: true
      manifest: |
        apiVersion: serving.kserve.io/v1alpha1
        kind: LLMInferenceService
        metadata:
          name: {{ model_name }}
          namespace: {{ project_namespace }}
          labels:
            dashboard.opendatahub.io/dashboard-resource: "true"
          annotations:
            openshift.io/display-name: "{{ model_name }}"
            openshift.io/description: ""
            security.opendatahub.io/enable-auth: "true"
        spec:
          model:
            uri: "{{ model_uri }}"
          router:
            gateway:
              name: {{ gateway_name }}
              namespace: {{ gateway_namespace }}
          replicas: {{ num_replicas }}
          template:
            containers:
              - name: vllm
                resources:
                  requests:
                    cpu: "4"
                    memory: "{{ memory_request }}"
                    nvidia.com/gpu: "{{ gpu_count }}"
                  limits:
                    memory: "{{ memory_request }}"
                    nvidia.com/gpu: "{{ gpu_count }}"
    post_check:
      command: "oc get llminferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.conditions[?(@.type==\"Ready\")].status}' 2>/dev/null"
      expected: "True"
      timeout: "900s"
      poll_interval: "30s"
      on_fail: STOP
    rollback: "oc delete llminferenceservice {{ model_name }} -n {{ project_namespace }}"

  - id: check-pod-scheduling
    confidence: doc-derived
    description: >
      Early failure detection ~45 seconds after InferenceService creation.
      Catches the two terminal conditions that will NEVER self-resolve — do not
      continue waiting 15 minutes if either is present:

      1. UNSCHEDULABLE — no node has enough resources to schedule the pod.
         Detected from: pod status condition reason=Unschedulable.
         Act immediately:
         - If GPU insufficient (no GPU nodes / all full): delete the InferenceService
           and ServingRuntime, then recreate using a CPU runtime with a smaller model.
           Standard CPU runtimes: vllm-cpu-runtime-template, vllm-cpu-x86-runtime-template
           Smallest safe CPU model: qwen2.5-0.5b-instruct (~1 GB, needs ~6 Gi memory)
         - If CPU/memory insufficient: cluster is full — use a smaller model or wait.

      2. IMAGEPULLBACKOFF / ErrImagePull — the image cannot be pulled.
         Detected from: pod containerStatuses[].state.waiting.reason.
         IMPORTANT: Not always terminal — check WHICH image is failing:
         - quay.io/rhoai/* or registry.redhat.io/rh* → subscription-gated RHOAI image.
           Standard fix: delete ServingRuntime + InferenceService, recreate with the
           public CPU alternative: quay.io/rh-aiservices-bu/vllm-cpu-openai-ubi9:0.3
           This is the documented non-subscription CPU runtime approach.
         - Public registry image (quay.io/rh-aiservices-bu, quay.io/redhat-ai-services, etc.)
           → truly terminal if URI is wrong. Verify the image reference and stop.

      3. CRASHLOOPBACKOFF / OOMKilled — container started but is crashing.
         Detected from: containerStatuses[].state.waiting.reason + lastState.terminated.reason.
         Pull the container logs and diagnose. Many are fixable with a single standard change:
         - OOMKilled → reduce --max-model-len (try 4096 or 2048) or use a smaller model
         - "RuntimeError: dtype" / "bfloat16 not supported" → change --dtype=half or remove --dtype
         - "model format" / "runtime not found" → fix modelFormat.name case (vLLM not vllm)
         - Any other clear config error → apply the minimum standard fix, then retry
         Principle: look at the log, identify the single root cause, apply the standard fix.
         If the log is unclear or the fix is non-obvious → stop and show the log to the user.

      If pod is in Init / PodInitializing / ContainerCreating / Running:
      it is making genuine progress → continue to the long wait.
    action:
      type: query
      command: |
        echo "Waiting 45s for scheduling attempt..."
        sleep 45

        # Always track the NEWEST pod — during a rollout after a patch, old crashing
        # pods are irrelevant. Sorting by creationTimestamp and taking the last one.
        POD_LINE=$(oc get pods -n {{ project_namespace }} \
          -l serving.kserve.io/inferenceservice={{ model_name }} \
          --no-headers --sort-by=.metadata.creationTimestamp 2>/dev/null | tail -1)

        if [ -z "$POD_LINE" ]; then
          echo "no pod yet — InferenceService controller still processing"
          echo "ok"
          exit 0
        fi

        POD_NAME=$(echo "$POD_LINE" | awk '{print $1}')
        POD_STATUS=$(echo "$POD_LINE" | awk '{print $3}')
        echo "Pod (newest): $POD_NAME  Status: $POD_STATUS"

        # Skip if this is an old terminating pod (deletionTimestamp set)
        IS_TERM=$(oc get pod "$POD_NAME" -n {{ project_namespace }} \
          -o jsonpath='{.metadata.deletionTimestamp}' 2>/dev/null)
        if [ -n "$IS_TERM" ]; then
          echo "Newest pod is terminating — waiting for new pod to be created"
          echo "ok"
          exit 0
        fi

        # --- Check Unschedulable ---
        UNSCHED=$(oc get pod "$POD_NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.conditions[?(@.reason=="Unschedulable")].message}' \
          2>/dev/null)
        if [ -n "$UNSCHED" ]; then
          echo "UNSCHEDULABLE: $UNSCHED"
          echo ""
          echo "=== Node resources ==="
          oc get nodes --no-headers 2>/dev/null | awk '{print $1, $4, $5}'
          echo "GPU nodes:"
          oc get nodes -l nvidia.com/gpu.present=true --no-headers 2>/dev/null || echo "  (none)"
          echo "terminal-unschedulable"
          exit 0
        fi

        # --- Check ImagePullBackOff (containers + init containers) ---
        IMG_ERR=$(oc get pod "$POD_NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].state.waiting.reason} {.status.initContainerStatuses[*].state.waiting.reason}' \
          2>/dev/null | tr ' ' '\n' | grep -iE "ImagePullBackOff|ErrImagePull" | head -1)
        if [ -n "$IMG_ERR" ]; then
          echo "IMAGE PULL ERROR: $IMG_ERR"
          # Extract the failing image name — critical for deciding if it's fixable
          FAIL_IMG=$(oc describe pod "$POD_NAME" -n {{ project_namespace }} 2>/dev/null | \
            grep -E "Failed to pull image" | head -3)
          echo "$FAIL_IMG"
          # Check if it's a subscription-gated image (quay.io/rhoai/ or registry.redhat.io/)
          if echo "$FAIL_IMG" | grep -qE "quay\.io/rhoai/|registry\.redhat\.io/rh"; then
            echo ""
            echo "SUBSCRIPTION IMAGE: This image requires RHOAI subscription credentials."
            echo "Standard fix: delete this ServingRuntime and recreate with the public CPU image."
            echo "  Public alternative: quay.io/rh-aiservices-bu/vllm-cpu-openai-ubi9:0.3"
            echo "  This is the documented approach in RHOAI devtools for CPU-only clusters."
            echo "image-pull-subscription"
          else
            echo "terminal-imagepull"
          fi
          exit 0
        fi

        # --- Check CrashLoopBackOff / OOMKilled ---
        # These mean the container started but is crashing. Pull logs — many are fixable.
        CRASH=$(oc get pod "$POD_NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].state.waiting.reason}' \
          2>/dev/null | tr ' ' '\n' | grep -i CrashLoopBackOff | head -1)
        OOM=$(oc get pod "$POD_NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].lastState.terminated.reason}' \
          2>/dev/null | grep -i OOMKilled | head -1)

        if [ -n "$CRASH" ] || [ -n "$OOM" ]; then
          echo "POD CRASHING: CrashLoopBackOff=${CRASH} OOMKilled=${OOM}"
          echo ""
          echo "=== kserve-container logs (last 60 lines) ==="
          # Always check kserve-container specifically — it is the actual model server.
          # The modelcar container (OCI file server) is always silent by design.
          oc logs "$POD_NAME" -n {{ project_namespace }} -c kserve-container --tail=60 2>/dev/null || \
            oc logs "$POD_NAME" -n {{ project_namespace }} --tail=60 2>/dev/null || \
            echo "(no logs yet — container may still be initializing)"
          echo ""
          echo "pod-crashing"
          exit 0
        fi

        echo "Pod is progressing ($POD_STATUS) — proceeding to long wait"
        echo "ok"
      store_as: pod_scheduling_status
    post_check:
      command: |
        POD_NAME=$(oc get pods -n {{ project_namespace }} \
          -l serving.kserve.io/inferenceservice={{ model_name }} \
          --no-headers --sort-by=.metadata.creationTimestamp 2>/dev/null | tail -1 | awk '{print $1}')
        if [ -z "$POD_NAME" ]; then echo "ok"; exit 0; fi
        IMG=$(oc get pod "$POD_NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].state.waiting.reason} {.status.initContainerStatuses[*].state.waiting.reason}' \
          2>/dev/null | tr ' ' '\n' | grep -iE "ImagePullBackOff|ErrImagePull" | head -1)
        UNSCHED=$(oc get pod "$POD_NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.conditions[?(@.reason=="Unschedulable")].message}' \
          2>/dev/null)
        CRASH=$(oc get pod "$POD_NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].state.waiting.reason}' \
          2>/dev/null | tr ' ' '\n' | grep -i CrashLoopBackOff | head -1)
        if [ -n "$IMG" ]; then echo "imagepull-error"
        elif [ -n "$UNSCHED" ]; then echo "unschedulable"
        elif [ -n "$CRASH" ]; then echo "pod-crashing"
        else echo "ok"; fi
      expected: "ok"
      timeout: "90s"
      on_fail: STOP
    on_fail_hint: >
      UNSCHEDULABLE — pod cannot be scheduled:
        GPU nodes missing/full: delete the InferenceService and its ServingRuntime,
          then recreate using a CPU runtime:
          oc process -n redhat-ods-applications vllm-cpu-runtime-template | oc apply -n {{ project_namespace }} -f -
          Use a small model: qwen2.5-0.5b-instruct (1 GB, needs ~6 Gi memory, ~4 CPU)
        CPU/memory insufficient: use a smaller model or reduce resource requests.
        Check resources: oc describe nodes | grep -A 5 "Allocated resources"
      IMAGEPULLBACKOFF — two cases:
        1. Subscription image (quay.io/rhoai/ or registry.redhat.io/rh*):
           Not terminal — fixable with the public CPU alternative.
           Standard fix:
             oc delete servingruntime vllm-cpu-runtime -n {{ project_namespace }} 2>/dev/null || true
             oc delete inferenceservice {{ model_name }} -n {{ project_namespace }} 2>/dev/null || true
           Then recreate with the public image by applying this ServingRuntime:
             apiVersion: serving.kserve.io/v1alpha1
             kind: ServingRuntime
             metadata:
               name: vllm-cpu-runtime
               namespace: {{ project_namespace }}
             spec:
               multiModel: false
               supportedModelFormats:
                 - name: vLLM
                   autoSelect: true
               containers:
                 - name: kserve-container
                   image: quay.io/rh-aiservices-bu/vllm-cpu-openai-ubi9:0.3
                   ports:
                     - containerPort: 8080
                   resources:
                     requests: {cpu: "4", memory: "6Gi"}
                     limits: {memory: "8Gi"}
           Then redeploy the InferenceService referencing this runtime.
        2. Public image with wrong URI: verify the OCI URI is correct.
           oc describe pod -l serving.kserve.io/inferenceservice={{ model_name }} -n {{ project_namespace }} | grep "Failed to pull"
      CRASHLOOPBACKOFF / OOMKILLED — check logs and apply one standard fix:
        oc logs -l serving.kserve.io/inferenceservice={{ model_name }} -n {{ project_namespace }} --tail=60
        OOMKilled fix: patch the InferenceService args to add --max-model-len=4096
          oc patch inferenceservice {{ model_name }} -n {{ project_namespace }} --type=json \
            -p '[{"op":"add","path":"/spec/predictor/model/args/-","value":"--max-model-len=4096"}]'
          Or use a smaller model and recreate.
        dtype errors: change --dtype in args (half → bfloat16, or remove --dtype)
        If the log is unclear: show the log output and stop — do not guess.

  - id: get-llmd-endpoint
    confidence: inferred
    description: Get the LLM-D endpoint URL via the Gateway
    action:
      type: query
      command: |
        # LLM-D exposes endpoint through the Gateway, not a direct route
        GW_HOST=$(oc get gateway {{ gateway_name }} -n {{ gateway_namespace }} \
          -o jsonpath='{.status.addresses[0].value}' 2>/dev/null)
        if [ -n "$GW_HOST" ]; then
          echo "http://$GW_HOST"
        else
          # Try to get the Gateway route
          oc get route -n {{ gateway_namespace }} -l gateway={{ gateway_name }} \
            -o jsonpath='{.items[0].spec.host}' 2>/dev/null | xargs -I{} echo "https://{}"
        fi
      store_as: llmd_endpoint
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "15s"
      on_fail: STOP
    return: |
      ✓ LLMInferenceService deployed: {{ model_name }}

      CRD:        serving.kserve.io/v1alpha1 LLMInferenceService
      Replicas:   {{ num_replicas }} vLLM pods
      Gateway:    {{ gateway_name }}.{{ gateway_namespace }}
      Endpoint:   {{ llmd_endpoint }}

      Test (once pods are ready):
        curl -X POST {{ llmd_endpoint }}/v1/chat/completions \
          -H "Content-Type: application/json" \
          -d '{"model": "{{ model_name }}", "messages": [{"role": "user", "content": "Hello!"}]}'

      LLM-D routing advantages (vs plain vLLM):
        - Prefix-cache-aware: routes to pod that already has the KV cache for this prefix
        - Queue-aware: routes to least-loaded pod
        - Activates fully with {{ num_replicas }} replicas

      Dashboard: https://<odh-dashboard>/ai-hub/deployments/{{ project_namespace }}

source_repos:
  - "https://github.com/kserve/kserve"
  - "https://github.com/opendatahub-io/kserve"
  - "https://github.com/opendatahub-io/odh-model-controller"
  - "https://github.com/opendatahub-io/opendatahub-operator"
  - "https://github.com/opendatahub-io/odh-dashboard"

known_bad_patterns:
  - "CRITICAL: LLMInferenceService uses a DIFFERENT CRD from standard InferenceService — do not confuse v1alpha1 LLMInferenceService with v1beta1 InferenceService"
  - "CRITICAL: the label is dashboard.opendatahub.io/dashboard-resource (note: different prefix from standard opendatahub.io/dashboard)"
  - "never set num_replicas=1 — LLM-D's routing intelligence only works with 2+ replicas"
  - "never try to deploy LLM-D without a Gateway — the Gateway is mandatory, not optional"
  - "never confuse this with plain vLLM on KServe — different CRD, different routing, different auth defaults"

rollback_order:
  - "oc delete llminferenceservice {{ model_name }} -n {{ project_namespace }}"
