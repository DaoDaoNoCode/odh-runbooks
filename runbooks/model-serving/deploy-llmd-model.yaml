name: model-serving-deploy-llmd-model
description: >
  Deploy an LLM using LLM-D (llm-d-inference-scheduler) for optimized routing.
  LLM-D provides prefix-cache-aware routing and queue-aware load balancing.
  Uses Kubernetes Gateway API + Envoy ext-proc for intelligent request scheduling.
  Different from plain vLLM/KServe — adds multi-pod routing intelligence.
  Requires: Helmfile, GPU nodes, HuggingFace token for model download.
rhoai_version_tested: null
confidence_overall: uncertain

parameters:
  - name: model_namespace
    description: Namespace to deploy LLM-D into
    required: false
    default: llm-d
  - name: model_name
    description: HuggingFace model ID (e.g. meta-llama/Meta-Llama-3-8B)
    required: true
  - name: num_replicas
    description: Number of vLLM replicas for load balancing
    required: false
    default: "2"
  - name: hf_token_secret
    description: Name of secret containing HF_TOKEN
    required: true

steps:
  - id: check-prerequisites
    confidence: uncertain
    description: Check Gateway API CRDs and Helmfile are available
    requires:
      - type: openshift-cluster
      - type: gpu-available
        can_auto_resolve: false
        blocker_message: "LLM-D requires GPU nodes. Run: odh run rosa/setup-gpu-machinepool"
    pre_check:
      command: "oc get crd gateways.gateway.networking.k8s.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      on_fail: STOP
    action:
      type: none
    post_check:
      command: "which helmfile > /dev/null 2>&1 && echo ok || echo missing"
      expected: "ok"
      timeout: "10s"
      on_fail: STOP

  - id: create-llmd-namespace
    confidence: doc-derived
    description: Create LLM-D deployment namespace
    pre_check:
      command: "oc get namespace {{ model_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: true
      manifest: |
        apiVersion: v1
        kind: Namespace
        metadata:
          name: {{ model_namespace }}
          labels:
            opendatahub.io/dashboard: "true"
    post_check:
      command: "oc get namespace {{ model_namespace }} -o jsonpath='{.status.phase}'"
      expected: "Active"
      timeout: "30s"
      on_fail: STOP

  - id: configure-llmd-deployment
    confidence: uncertain
    description: >
      LLM-D is deployed via Helmfile (not kubectl apply).
      This step shows the configuration — run helmfile sync manually.
    action:
      type: none
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "5s"
      on_fail: STOP
    return: |
      ⚠ LLM-D requires Helmfile deployment (not standard kubectl).

      STEP 1: Create HuggingFace token secret
        oc create secret generic llm-d-hf-token \
          --from-literal=HF_TOKEN=$HF_TOKEN \
          -n {{ model_namespace }}

      STEP 2: Create helmfile.yaml
        helmFiles:
          - path: llm-d-infra/helmfile.yaml
            values:
              - NAMESPACE: {{ model_namespace }}
              - MODEL: {{ model_name }}
              - REPLICAS: {{ num_replicas }}
              - SCHEDULING_CONFIG: precise-prefix-cache-aware
              - HF_TOKEN_SECRET: {{ hf_token_secret }}

      STEP 3: Deploy
        helmfile -f helmfile.yaml sync

      STEP 4: Verify Gateway
        oc get gateways -n {{ model_namespace }}
        oc get httproutes -n {{ model_namespace }}
        oc get pods -n {{ model_namespace }}

      STEP 5: Test endpoint
        GATEWAY_URL=$(oc get gateway -n {{ model_namespace }} \
          -o jsonpath='{.items[0].status.addresses[0].value}')
        curl -X POST http://$GATEWAY_URL/v1/chat/completions \
          -H "Content-Type: application/json" \
          -d '{"model": "{{ model_name }}", "messages": [{"role": "user", "content": "Hello"}]}'

      ─────────────────────────────────────────────────────
      LLM-D SCHEDULING CONFIG OPTIONS:
        precise-prefix-cache-aware  — Best for KV cache reuse (default)
        queue-depth-aware           — Best for high concurrency
        round-robin                 — Simple load balancing

      HOW IT DIFFERS FROM PLAIN vLLM/KSERVE:
        Plain vLLM: L4 load balancing, no context awareness
        LLM-D:      Routes to pod that already has the KV cache for this prefix
                    → 40-60% latency reduction for repeated context patterns

      INTEGRATION WITH DASHBOARD:
        Once deployed, add the Gateway URL as a model connection in ODH:
        odh run genai/enable-chat-playground \
          -p model_url=http://$GATEWAY_URL \
          -p model_name={{ model_name }}
      ─────────────────────────────────────────────────────

known_bad_patterns:
  - "never try to deploy LLM-D with kubectl apply — it requires Helmfile orchestration"
  - "never run LLM-D without GPU nodes — vLLM only runs on GPU"
  - "never set num_replicas=1 — LLM-D's routing intelligence only activates with 2+ replicas"
  - "never deploy LLM-D without the Gateway API CRDs installed — the Gateway won't be created"

rollback_order:
  - "helmfile -f helmfile.yaml destroy"
  - "oc delete namespace {{ model_namespace }}"
