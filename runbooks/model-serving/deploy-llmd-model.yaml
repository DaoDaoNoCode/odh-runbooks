name: model-serving-deploy-llmd-model
description: >
  Deploy an LLM using LLM-D (LLMInferenceService CRD) for optimized distributed inference.
  SOURCE: packages/llmd-serving in odh-dashboard.

  CRITICAL DISTINCTION from standard KServe:
  LLM-D uses a COMPLETELY DIFFERENT CRD — NOT InferenceService (v1beta1).
  It uses: serving.kserve.io/v1alpha1 LLMInferenceService

  Key differences from standard KServe deploy-vllm-model:
  - CRD: LLMInferenceService (not InferenceService)
  - Model spec: spec.model.uri (not spec.predictor.model.storage)
  - Routing: spec.router.gateway (Gateway-based, not IngressClass)
  - Auth: ENABLED BY DEFAULT (not disabled like standard KServe)
  - Auth creates RBAC: Role + ServiceAccount + RoleBinding + Secret
  - Pod label: app.kubernetes.io/component=llminferenceservice-workload
  - No external route option (disabled in llmd-serving package)
  - No deployment strategy option (disabled in llmd-serving package)

  LLM-D provides prefix-cache-aware routing and queue-aware load balancing
  across multiple vLLM pods for better latency at scale.

  PREREQUISITE: An LLM-D Gateway must exist in the cluster.
  The llm-d-inference-scheduler must be deployed separately.
rhoai_version_tested: null
confidence_overall: inferred

parameters:
  - name: project_namespace
    description: Namespace to deploy the LLMInferenceService into
    required: true
    discover_cmd: "oc get namespace -l opendatahub.io/dashboard=true --no-headers -o jsonpath='{.items[*].metadata.name}'"
    hint: "Must be an ODH Data Science Project"
    example: "llm-serving"
  - name: model_name
    description: Name for the LLMInferenceService
    required: true
    example: "llama3-8b-llmd"
    hint: "Lowercase letters, numbers, hyphens. Max 63 chars."
  - name: model_uri
    description: "Model URI — can be HuggingFace hub ID or S3 path"
    required: true
    example: "Qwen/Qwen2.5-7B-Instruct"
    hint: "HuggingFace model ID (ungated models work without HF token) or s3://bucket/path"
  - name: gateway_name
    description: Name of the LLM-D Gateway to route through
    required: true
    discover_cmd: "oc get gateway -A --no-headers -o jsonpath='{range .items[*]}{.metadata.name}{\" \"}{.metadata.namespace}{\"\\n\"}{end}' 2>/dev/null"
    hint: "Must be an existing Gateway resource. Deploy llm-d-inference-scheduler first."
    example: "llm-d-gateway"
  - name: gateway_namespace
    description: Namespace where the Gateway lives
    required: false
    default: "{{ project_namespace }}"
  - name: gpu_count
    description: Number of GPUs per replica
    required: false
    default: "1"
    enum: ["1", "2", "4", "8"]
  - name: memory_request
    description: Memory request per pod
    required: false
    default: "24Gi"
  - name: num_replicas
    description: "Number of vLLM replicas (>1 activates LLM-D scheduling intelligence)"
    required: false
    default: "2"
    hint: "LLM-D's routing intelligence only activates with >= 2 replicas"
  - name: hf_token_secret
    description: "Kubernetes secret name containing HF_TOKEN (required for gated models like Llama)"
    required: false
    default: ""
    hint: "Leave empty for ungated models (Qwen, Mistral, etc.). Create with: oc create secret generic hf-token --from-literal=HF_TOKEN=hf_xxx"

steps:
  - id: check-prerequisites
    confidence: inferred
    description: Verify LLMInferenceService CRD exists (llm-d-inference-scheduler must be deployed)
    requires:
      - type: openshift-cluster
      - type: gpu-available
        can_auto_resolve: false
        blocker_message: "LLM-D requires GPU nodes. Run: odh run rosa/setup-gpu-machinepool"
      - type: namespace
        name: "{{ project_namespace }}"
    pre_check:
      command: "oc get crd llminferenceservices.serving.kserve.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      on_fail: STOP
    action:
      type: none
    post_check:
      command: "oc get crd llminferenceservices.serving.kserve.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "10s"
      on_fail: STOP
    on_fail_hint: >
      LLMInferenceService CRD not found. The llm-d-inference-scheduler must be deployed first.
      This is typically deployed via the ODH operator with llmd-serving component enabled,
      or via Helmfile from the llm-d-inference-scheduler repo.

  - id: check-gateway-exists
    confidence: inferred
    description: Verify the specified Gateway exists
    pre_check:
      command: "oc get gateway {{ gateway_name }} -n {{ gateway_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      on_fail: STOP
    action:
      type: none
    post_check:
      command: "oc get gateway {{ gateway_name }} -n {{ gateway_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "10s"
      on_fail: STOP
    on_fail_hint: >
      Gateway not found. List available gateways with:
        oc get gateway -A
      The llm-d-inference-scheduler deploys gateways automatically.
      Check its deployment status first.

  - id: create-llm-inference-service
    confidence: inferred
    description: >
      Create LLMInferenceService — the LLM-D CRD (NOT standard KServe InferenceService).
      From packages/llmd-serving dashboard source:
      - apiVersion: serving.kserve.io/v1alpha1 (NOT v1beta1)
      - spec.model.uri: direct model reference
      - spec.router.gateway: Gateway-based routing (not Ingress)
      - spec.replicas: number of vLLM pods
      - Labels: dashboard.opendatahub.io/dashboard-resource=true (note: different from standard!)
      - Auth enabled by default in llmd-serving package
      - Pod label: app.kubernetes.io/component=llminferenceservice-workload
    pre_check:
      command: "oc get llminferenceservice {{ model_name }} -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: true
      manifest: |
        apiVersion: serving.kserve.io/v1alpha1
        kind: LLMInferenceService
        metadata:
          name: {{ model_name }}
          namespace: {{ project_namespace }}
          labels:
            dashboard.opendatahub.io/dashboard-resource: "true"
          annotations:
            openshift.io/display-name: "{{ model_name }}"
            openshift.io/description: ""
            security.opendatahub.io/enable-auth: "true"
        spec:
          model:
            uri: "{{ model_uri }}"
          router:
            gateway:
              name: {{ gateway_name }}
              namespace: {{ gateway_namespace }}
          replicas: {{ num_replicas }}
          template:
            containers:
              - name: vllm
                resources:
                  requests:
                    cpu: "4"
                    memory: "{{ memory_request }}"
                    nvidia.com/gpu: "{{ gpu_count }}"
                  limits:
                    memory: "{{ memory_request }}"
                    nvidia.com/gpu: "{{ gpu_count }}"
    post_check:
      command: "oc get llminferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.conditions[?(@.type==\"Ready\")].status}' 2>/dev/null"
      expected: "True"
      timeout: "900s"
      poll_interval: "30s"
      on_fail: STOP
    rollback: "oc delete llminferenceservice {{ model_name }} -n {{ project_namespace }}"

  - id: check-pod-scheduling
    confidence: doc-derived
    description: >
      Wait 45 seconds after deployment to catch terminal failures early instead
      of polling blindly for 15 minutes.

      Always tracks the NEWEST pod — during a rolling update the old crashing
      pod is irrelevant; check the one being created.

      Three conditions caught immediately:
        UNSCHEDULABLE: no node can schedule the pod — diagnose resources, fix.
        IMAGEPULLBACKOFF: image unreachable — check which image and why.
        CRASHLOOPBACKOFF/OOMKILLED: container crashes — pull kserve-container
          logs (not modelcar, which is always silent) and diagnose the cause.

      If the pod is Running with a failing readiness probe: normal during model
      loading. Keep waiting. The probe passes once the server is ready to serve.
    action:
      type: query
      command: |
        sleep 45
        POD=$(oc get pods -n {{ project_namespace }} \
          -l serving.kserve.io/inferenceservice={{ model_name }} \
          --no-headers --sort-by=.metadata.creationTimestamp 2>/dev/null | tail -1)
        [ -z "$POD" ] && echo "ok" && exit 0

        NAME=$(echo "$POD" | awk '{print $1}')
        echo "Pod: $NAME  Status: $(echo "$POD" | awk '{print $3}')"

        # Skip pods being terminated by a previous rollout
        [ -n "$(oc get pod "$NAME" -n {{ project_namespace }} \
          -o jsonpath='{.metadata.deletionTimestamp}' 2>/dev/null)" ] && \
          echo "old pod terminating — new one starting" && echo "ok" && exit 0

        # Unschedulable
        UNSCHED=$(oc get pod "$NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.conditions[?(@.reason=="Unschedulable")].message}' \
          2>/dev/null)
        if [ -n "$UNSCHED" ]; then
          echo "UNSCHEDULABLE: $UNSCHED"
          oc get nodes --no-headers 2>/dev/null | awk '{print $1, $4, $5}'
          oc get nodes -l nvidia.com/gpu.present=true --no-headers 2>/dev/null || echo "(no GPU nodes)"
          echo "unschedulable"; exit 0
        fi

        # ImagePullBackOff — show which image failed so the fix is obvious
        IMGPULL=$(oc get pod "$NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].state.waiting.reason} {.status.initContainerStatuses[*].state.waiting.reason}' \
          2>/dev/null | tr ' ' '\n' | grep -iE "ImagePullBackOff|ErrImagePull" | head -1)
        if [ -n "$IMGPULL" ]; then
          echo "IMAGE PULL ERROR: $IMGPULL"
          oc describe pod "$NAME" -n {{ project_namespace }} 2>/dev/null | \
            grep "Failed to pull" | head -3
          echo "imagepull"; exit 0
        fi

        # CrashLoopBackOff / OOMKilled — pull logs for diagnosis
        CRASH=$(oc get pod "$NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].state.waiting.reason} {.status.containerStatuses[*].lastState.terminated.reason}' \
          2>/dev/null | tr ' ' '\n' | grep -iE "CrashLoopBackOff|OOMKilled" | head -1)
        if [ -n "$CRASH" ]; then
          echo "CRASHING: $CRASH"
          oc logs "$NAME" -n {{ project_namespace }} -c kserve-container --tail=40 2>/dev/null || \
            oc logs "$NAME" -n {{ project_namespace }} --tail=40 2>/dev/null || \
            echo "(no logs yet)"
          echo "pod-crashing"; exit 0
        fi

        echo "ok"
      store_as: pod_health_status
    post_check:
      command: |
        POD=$(oc get pods -n {{ project_namespace }} \
          -l serving.kserve.io/inferenceservice={{ model_name }} \
          --no-headers --sort-by=.metadata.creationTimestamp 2>/dev/null | tail -1 | awk '{print $1}')
        [ -z "$POD" ] && echo "ok" && exit 0
        CRASH=$(oc get pod "$POD" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].state.waiting.reason}' 2>/dev/null | \
          tr ' ' '\n' | grep -iE "ImagePullBackOff|ErrImagePull|CrashLoopBackOff" | head -1)
        UNSCHED=$(oc get pod "$POD" -n {{ project_namespace }} \
          -o jsonpath='{.status.conditions[?(@.reason=="Unschedulable")].message}' 2>/dev/null)
        [ -n "$CRASH" ] && echo "terminal" && exit 0
        [ -n "$UNSCHED" ] && echo "unschedulable" && exit 0
        echo "ok"
      expected: "ok"
      timeout: "90s"
      on_fail: STOP
    on_fail_hint: >
      UNSCHEDULABLE: oc describe nodes | grep -A5 "Allocated resources"
        No GPU nodes: use a CPU runtime with a small model.
        No CPU/memory: reduce resource requests or use a smaller model.
      IMAGEPULLBACKOFF: which image failed? (oc describe pod | grep "Failed to pull")
        Subscription image (quay.io/rhoai/, registry.redhat.io/): use a public alternative.
        Wrong URI: fix the image reference in the ServingRuntime or InferenceService.
      CRASHLOOPBACKOFF — diagnose from the logs above. Common fixes:
        Wrong port: add --port=8080 to ServingRuntime args (KServe probes 8080, vLLM defaults 8000)
        Wrong model path: add --model=/mnt/models (reads from KServe's model mount, not vLLM default)
        OOM: reduce --max-model-len or use a smaller model
        dtype: change --dtype=half to --dtype=bfloat16 or remove it

  - id: get-llmd-endpoint
    confidence: inferred
    description: Get the LLM-D endpoint URL via the Gateway
    action:
      type: query
      command: |
        # LLM-D exposes endpoint through the Gateway, not a direct route
        GW_HOST=$(oc get gateway {{ gateway_name }} -n {{ gateway_namespace }} \
          -o jsonpath='{.status.addresses[0].value}' 2>/dev/null)
        if [ -n "$GW_HOST" ]; then
          echo "http://$GW_HOST"
        else
          # Try to get the Gateway route
          oc get route -n {{ gateway_namespace }} -l gateway={{ gateway_name }} \
            -o jsonpath='{.items[0].spec.host}' 2>/dev/null | xargs -I{} echo "https://{}"
        fi
      store_as: llmd_endpoint
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "15s"
      on_fail: STOP
    return: |
      ✓ LLMInferenceService deployed: {{ model_name }}

      CRD:        serving.kserve.io/v1alpha1 LLMInferenceService
      Replicas:   {{ num_replicas }} vLLM pods
      Gateway:    {{ gateway_name }}.{{ gateway_namespace }}
      Endpoint:   {{ llmd_endpoint }}

      Test (once pods are ready):
        curl -X POST {{ llmd_endpoint }}/v1/chat/completions \
          -H "Content-Type: application/json" \
          -d '{"model": "{{ model_name }}", "messages": [{"role": "user", "content": "Hello!"}]}'

      LLM-D routing advantages (vs plain vLLM):
        - Prefix-cache-aware: routes to pod that already has the KV cache for this prefix
        - Queue-aware: routes to least-loaded pod
        - Activates fully with {{ num_replicas }} replicas

      Dashboard: https://<odh-dashboard>/ai-hub/deployments/{{ project_namespace }}

source_repos:
  - "https://github.com/kserve/kserve"
  - "https://github.com/opendatahub-io/kserve"
  - "https://github.com/opendatahub-io/odh-model-controller"
  - "https://github.com/opendatahub-io/opendatahub-operator"
  - "https://github.com/opendatahub-io/odh-dashboard"

known_bad_patterns:
  - "CRITICAL: LLMInferenceService uses a DIFFERENT CRD from standard InferenceService — do not confuse v1alpha1 LLMInferenceService with v1beta1 InferenceService"
  - "CRITICAL: the label is dashboard.opendatahub.io/dashboard-resource (note: different prefix from standard opendatahub.io/dashboard)"
  - "never set num_replicas=1 — LLM-D's routing intelligence only works with 2+ replicas"
  - "never try to deploy LLM-D without a Gateway — the Gateway is mandatory, not optional"
  - "never confuse this with plain vLLM on KServe — different CRD, different routing, different auth defaults"

rollback_order:
  - "oc delete llminferenceservice {{ model_name }} -n {{ project_namespace }}"
