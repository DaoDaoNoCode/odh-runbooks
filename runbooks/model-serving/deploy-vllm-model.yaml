name: model-serving-deploy-vllm-model
description: >
  Deploy an LLM using vLLM on KServe in Standard (RawDeployment) mode.
  SOURCE: Internal docs RHOAIENG-24906 (vLLM KServe vs Standalone)

  CRITICAL: GPU vs CPU use COMPLETELY DIFFERENT ServingRuntimes and args.

  GPU PATH (supported, recommended):
    ServingRuntime: "vLLM NVIDIA GPU ServingRuntime for KServe" — BUILT-IN, do not create
    Image: managed by RHOAI runtime, uses NVIDIA CUDA
    Args: --chat-template=/opt/app-root/template/tool_chat_template_llama3.2_json.jinja
    NOTE: Remove --enable-chunked-prefill for older GPUs (NVIDIA T4) — causes issues

  CPU PATH (EXPERIMENTAL, not supported, not for production):
    ServingRuntime: must DUPLICATE "vLLM CPU (ppc64le/s390x) ServingRuntime for KServe"
                    change name to "vllm-cpu-runtime-amd64"
                    change image to quay.io/rh-aiservices-bu/vllm-cpu-openai-ubi9:0.3
    Args: --chat-template=/workspace/vllm/examples/tool_chat_template_llama3.2_json.jinja
          (DIFFERENT path from GPU!)
    Performance: ~3 tokens/s — very slow

  MODEL STORAGE (OCI modelcar catalog — no S3 needed):
    Connection Type: URI - v1 (NOT S3, NOT HuggingFace)
    URI format: oci://quay.io/redhat-ai-services/modelcar-catalog:<tag>
    Note: HuggingFace as a Data Connection is NOT currently supported in RHOAI

  SUPPORTED MODELS (from modelcar catalog — public, no auth):
    oci://quay.io/redhat-ai-services/modelcar-catalog:llama-3.2-3b-instruct  (5.9 GiB)
    oci://quay.io/redhat-ai-services/modelcar-catalog:llama-3.2-3b-instruct-quantized.w8a8  (4.1 GiB)
    oci://quay.io/redhat-ai-services/modelcar-catalog:llama-3.2-8b-instruct-quantized.w4a16  (5.3 GiB)
    oci://quay.io/redhat-ai-services/modelcar-catalog:granite-3.3-2b-instruct  (5 GiB)

  WHAT odh-model-controller AUTO-CREATES (do not create manually):
    - OpenShift Route (status.url is populated automatically)
    - ServiceMonitor/PodMonitor
    - ClusterRoleBinding (when enable-auth=true)

rhoai_version_tested: null
confidence_overall: doc-derived

parameters:
  - name: project_namespace
    description: Project namespace
    required: true
    discover_cmd: "oc get namespace -l opendatahub.io/dashboard=true --no-headers -o jsonpath='{.items[*].metadata.name}'"
    hint: "Must be an ODH Data Science Project"
  - name: model_name
    description: Name for the InferenceService
    required: true
    example: "llama-3-2-3b-instruct"
    hint: "Lowercase letters, numbers, hyphens. Max 63 chars."
  - name: model_oci_uri
    description: "OCI URI of the model from modelcar catalog"
    required: false
    default: "oci://quay.io/redhat-ai-services/modelcar-catalog:llama-3.2-3b-instruct"
    enum:
      - "oci://quay.io/redhat-ai-services/modelcar-catalog:llama-3.2-3b-instruct"
      - "oci://quay.io/redhat-ai-services/modelcar-catalog:llama-3.2-3b-instruct-quantized.w8a8"
      - "oci://quay.io/redhat-ai-services/modelcar-catalog:llama-3.2-8b-instruct-quantized.w4a16"
      - "oci://quay.io/redhat-ai-services/modelcar-catalog:granite-3.3-2b-instruct"
    hint: >
      OCI format from Red Hat's public modelcar catalog — no S3 or credentials needed.
      HuggingFace is NOT supported as a connection type in current RHOAI.
  - name: accelerator
    description: "GPU or CPU deployment"
    required: false
    default: gpu
    enum: ["gpu", "cpu"]
    hint: >
      gpu: uses built-in 'vLLM NVIDIA GPU ServingRuntime for KServe' (supported)
      cpu: EXPERIMENTAL, not supported, ~3 tokens/s — only for clusters without GPU
  - name: gpu_count
    description: Number of GPUs (only for gpu accelerator)
    required: false
    default: "1"
    enum: ["1", "2", "4", "8"]
  - name: memory_request
    description: Memory request
    required: false
    default: "10Gi"
    hint: "GPU: 10Gi minimum for 3B model. CPU: 12Gi requested, 18Gi limit."
  - name: max_model_len
    description: Maximum context window in tokens
    required: false
    default: "20000"
    hint: "Reduce to 8192 if you get OOM errors with T4 GPUs"
  - name: enable_chunked_prefill
    description: "Enable chunked prefill (disable for T4/older GPUs)"
    required: false
    default: "true"
    enum: ["true", "false"]
    hint: "Set false for NVIDIA T4 GPUs — causes issues (see vllm#2729)"

steps:
  - id: check-prerequisites
    confidence: doc-derived
    description: Verify KServe enabled and namespace exists
    requires:
      - type: kserve-enabled
      - type: namespace
        name: "{{ project_namespace }}"
    action:
      type: none
    post_check:
      command: "oc get crd inferenceservices.serving.kserve.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "10s"
      on_fail: STOP

  - id: create-uri-connection
    confidence: doc-derived
    description: >
      Create URI-v1 connection pointing to OCI model URI.
      The dashboard uses "URI - v1" connection type (NOT S3) for OCI/modelcar models.
      Connection stores the oci:// URI which KServe uses to fetch the model.
    pre_check:
      command: "oc get secret {{ model_name }}-connection -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: true
      manifest: |
        apiVersion: v1
        kind: Secret
        metadata:
          name: {{ model_name }}-connection
          namespace: {{ project_namespace }}
          labels:
            opendatahub.io/dashboard: "true"
            opendatahub.io/managed: "true"
          annotations:
            openshift.io/display-name: "{{ model_name }}"
            opendatahub.io/connection-type: "uri"
        type: Opaque
        stringData:
          URI: "{{ model_oci_uri }}"
    post_check:
      command: "oc get secret {{ model_name }}-connection -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      timeout: "15s"
      on_fail: STOP
    rollback: "oc delete secret {{ model_name }}-connection -n {{ project_namespace }} 2>/dev/null || true"

  - id: create-cpu-serving-runtime
    confidence: doc-derived
    description: >
      CPU ONLY: Create experimental vLLM CPU ServingRuntime for amd64.
      The correct approach per docs: DUPLICATE "vLLM CPU (ppc64le/s390x) ServingRuntime for KServe"
      then set name=vllm-cpu-runtime-amd64 and image=quay.io/rh-aiservices-bu/vllm-cpu-openai-ubi9:0.3
      This is EXPERIMENTAL and NOT supported — for internal testing only.
      Skipped entirely for GPU deployments (GPU uses the built-in runtime).
    pre_check:
      command: "[ '{{ accelerator }}' = 'cpu' ] && echo needed || echo skip"
      expected: "needed"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: true
      manifest: |
        apiVersion: serving.kserve.io/v1alpha1
        kind: ServingRuntime
        metadata:
          name: vllm-cpu-runtime-amd64
          namespace: {{ project_namespace }}
          labels:
            opendatahub.io/dashboard: "true"
          annotations:
            openshift.io/display-name: "vLLM CPU (amd64 - EXPERIMENTAL)"
            opendatahub.io/template-name: "vllm-cpu-runtime-amd64"
            opendatahub.io/template-display-name: "vLLM CPU (amd64 - EXPERIMENTAL) ServingRuntime for KServe"
        spec:
          multiModel: false
          supportedModelFormats:
            - name: vllm
              autoSelect: true
          containers:
            - name: kserve-container
              image: quay.io/rh-aiservices-bu/vllm-cpu-openai-ubi9:0.3
              ports:
                - containerPort: 8080
                  protocol: TCP
              resources:
                requests:
                  cpu: "1"
                  memory: "12Gi"
                limits:
                  cpu: "4"
                  memory: "18Gi"
              volumeMounts:
                - name: shm
                  mountPath: /dev/shm
          volumes:
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: 2Gi
    post_check:
      command: "oc get servingruntime vllm-cpu-runtime-amd64 -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      timeout: "30s"
      on_fail: STOP

  - id: deploy-inference-service
    confidence: doc-derived
    description: >
      Create KServe InferenceService with correct runtime per accelerator type.

      GPU: references built-in "vLLM NVIDIA GPU ServingRuntime for KServe" (do NOT create it)
        args: --chat-template=/opt/app-root/template/... (GPU-specific path)
        Remove --enable-chunked-prefill for T4 GPUs

      CPU (EXPERIMENTAL): references vllm-cpu-runtime-amd64 (created in previous step)
        args: --chat-template=/workspace/vllm/examples/... (CPU-specific path — DIFFERENT!)
        Performance: ~3 tokens/s, not for production

      Model source: URI connection (oci:// storageUri) — no S3 needed
    pre_check:
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: true
      manifest: |
        apiVersion: serving.kserve.io/v1beta1
        kind: InferenceService
        metadata:
          name: {{ model_name }}
          namespace: {{ project_namespace }}
          labels:
            opendatahub.io/dashboard: "true"
          annotations:
            openshift.io/display-name: "{{ model_name }}"
            openshift.io/description: ""
            opendatahub.io/model-type: "Generative"
            opendatahub.io/connections: "{{ model_name }}-connection"
            opendatahub.io/connection-path: "{{ model_oci_uri }}"
            security.opendatahub.io/enable-auth: "false"
            serving.kserve.io/deploymentMode: RawDeployment
        spec:
          predictor:
            minReplicas: 1
            model:
              modelFormat:
                name: vLLM
              runtime: "{{ 'vllm-cpu-x86-runtime' if accelerator == 'cpu' else 'vllm-cuda-runtime' }}"
              storageUri: "{{ model_oci_uri }}"
              resources:
                requests:
                  cpu: "1"
                  memory: "{{ memory_request }}"
                {{ 'nvidia.com/gpu: "' + gpu_count + '"' if accelerator == 'gpu' else '' }}
                limits:
                  memory: "{{ memory_request }}"
                  {{ 'nvidia.com/gpu: "' + gpu_count + '"' if accelerator == 'gpu' else '' }}
              args:
                - "--dtype=half"
                - "--max-model-len={{ max_model_len }}"
                - "--gpu-memory-utilization=0.95"
                - "--enable-auto-tool-choice"
                - "--tool-call-parser=llama3_json"
                - "{{ '--chat-template=/opt/app-root/template/tool_chat_template_llama3.2_json.jinja' if accelerator == 'gpu' else '--chat-template=/workspace/vllm/examples/tool_chat_template_llama3.2_json.jinja' }}"
    post_check:
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.modelStatus.states.activeModelState}'"
      expected: "Loaded"
      timeout: "900s"
      poll_interval: "30s"
      on_fail: STOP
    on_fail_hint: >
      Model failed to load. Common causes:
        GPU: No GPU nodes → run odh run gpu/verify-gpu-available
        GPU: T4 with chunked prefill → re-run with -p enable_chunked_prefill=false
        CPU: Insufficient memory → increase memory_request (CPU needs ~12Gi for 3B model)
        Check logs: oc logs -l serving.kserve.io/inferenceservice={{ model_name }} -n {{ project_namespace }}
    rollback: "oc delete inferenceservice {{ model_name }} -n {{ project_namespace }}"

  - id: check-pod-scheduling
    confidence: doc-derived
    description: >
      Early failure detection ~45 seconds after InferenceService creation.
      Catches the two terminal conditions that will NEVER self-resolve — do not
      continue waiting 15 minutes if either is present:

      1. UNSCHEDULABLE — no node has enough resources to schedule the pod.
         Detected from: pod status condition reason=Unschedulable.
         Act immediately:
         - If GPU insufficient (no GPU nodes / all full): delete the InferenceService
           and ServingRuntime, then recreate using a CPU runtime with a smaller model.
           Standard CPU runtimes: vllm-cpu-runtime-template, vllm-cpu-x86-runtime-template
           Smallest safe CPU model: qwen2.5-0.5b-instruct (~1 GB, needs ~6 Gi memory)
         - If CPU/memory insufficient: cluster is full — use a smaller model or wait.

      2. IMAGEPULLBACKOFF / ErrImagePull — the image cannot be pulled.
         Detected from: pod containerStatuses[].state.waiting.reason.
         This is a terminal condition — retrying will not fix it.
         Stop immediately and fix the image URI or registry access.

      3. CRASHLOOPBACKOFF / OOMKilled — container started but is crashing.
         Detected from: containerStatuses[].state.waiting.reason + lastState.terminated.reason.
         Pull the container logs and diagnose. Many are fixable with a single standard change:
         - OOMKilled → reduce --max-model-len (try 4096 or 2048) or use a smaller model
         - "RuntimeError: dtype" / "bfloat16 not supported" → change --dtype=half or remove --dtype
         - "model format" / "runtime not found" → fix modelFormat.name case (vLLM not vllm)
         - Any other clear config error → apply the minimum standard fix, then retry
         Principle: look at the log, identify the single root cause, apply the standard fix.
         If the log is unclear or the fix is non-obvious → stop and show the log to the user.

      If pod is in Init / PodInitializing / ContainerCreating / Running:
      it is making genuine progress → continue to the long wait.
    action:
      type: query
      command: |
        echo "Waiting 45s for scheduling attempt..."
        sleep 45

        POD_LINE=$(oc get pods -n {{ project_namespace }} \
          -l serving.kserve.io/inferenceservice={{ model_name }} \
          --no-headers 2>/dev/null | head -1)

        if [ -z "$POD_LINE" ]; then
          echo "no pod yet — InferenceService controller still processing"
          echo "ok"
          exit 0
        fi

        POD_NAME=$(echo "$POD_LINE" | awk '{print $1}')
        POD_STATUS=$(echo "$POD_LINE" | awk '{print $3}')
        echo "Pod: $POD_NAME  Status: $POD_STATUS"

        # --- Check Unschedulable ---
        UNSCHED=$(oc get pod "$POD_NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.conditions[?(@.reason=="Unschedulable")].message}' \
          2>/dev/null)
        if [ -n "$UNSCHED" ]; then
          echo "UNSCHEDULABLE: $UNSCHED"
          echo ""
          echo "=== Node resources ==="
          oc get nodes --no-headers 2>/dev/null | awk '{print $1, $4, $5}'
          echo "GPU nodes:"
          oc get nodes -l nvidia.com/gpu.present=true --no-headers 2>/dev/null || echo "  (none)"
          echo "terminal-unschedulable"
          exit 0
        fi

        # --- Check ImagePullBackOff (containers + init containers) ---
        IMG_ERR=$(oc get pod "$POD_NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].state.waiting.reason} {.status.initContainerStatuses[*].state.waiting.reason}' \
          2>/dev/null | tr ' ' '\n' | grep -iE "ImagePullBackOff|ErrImagePull" | head -1)
        if [ -n "$IMG_ERR" ]; then
          echo "IMAGE PULL ERROR: $IMG_ERR"
          oc describe pod "$POD_NAME" -n {{ project_namespace }} 2>/dev/null | \
            grep -E "Failed to pull|Error.*image|Back-off pulling" | head -5
          echo "terminal-imagepull"
          exit 0
        fi

        # --- Check CrashLoopBackOff / OOMKilled ---
        # These mean the container started but is crashing. Pull logs — many are fixable.
        CRASH=$(oc get pod "$POD_NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].state.waiting.reason}' \
          2>/dev/null | tr ' ' '\n' | grep -i CrashLoopBackOff | head -1)
        OOM=$(oc get pod "$POD_NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].lastState.terminated.reason}' \
          2>/dev/null | grep -i OOMKilled | head -1)

        if [ -n "$CRASH" ] || [ -n "$OOM" ]; then
          echo "POD CRASHING: CrashLoopBackOff=${CRASH} OOMKilled=${OOM}"
          echo ""
          echo "=== Container logs (last 60 lines) ==="
          oc logs "$POD_NAME" -n {{ project_namespace }} --tail=60 2>/dev/null || \
            oc logs "$POD_NAME" -n {{ project_namespace }} -c kserve-container --tail=60 2>/dev/null || \
            echo "(no logs yet)"
          echo ""
          echo "pod-crashing"
          exit 0
        fi

        echo "Pod is progressing ($POD_STATUS) — proceeding to long wait"
        echo "ok"
      store_as: pod_scheduling_status
    post_check:
      command: |
        POD_NAME=$(oc get pods -n {{ project_namespace }} \
          -l serving.kserve.io/inferenceservice={{ model_name }} \
          --no-headers 2>/dev/null | head -1 | awk '{print $1}')
        if [ -z "$POD_NAME" ]; then echo "ok"; exit 0; fi
        IMG=$(oc get pod "$POD_NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].state.waiting.reason} {.status.initContainerStatuses[*].state.waiting.reason}' \
          2>/dev/null | tr ' ' '\n' | grep -iE "ImagePullBackOff|ErrImagePull" | head -1)
        UNSCHED=$(oc get pod "$POD_NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.conditions[?(@.reason=="Unschedulable")].message}' \
          2>/dev/null)
        CRASH=$(oc get pod "$POD_NAME" -n {{ project_namespace }} \
          -o jsonpath='{.status.containerStatuses[*].state.waiting.reason}' \
          2>/dev/null | tr ' ' '\n' | grep -i CrashLoopBackOff | head -1)
        if [ -n "$IMG" ]; then echo "imagepull-error"
        elif [ -n "$UNSCHED" ]; then echo "unschedulable"
        elif [ -n "$CRASH" ]; then echo "pod-crashing"
        else echo "ok"; fi
      expected: "ok"
      timeout: "90s"
      on_fail: STOP
    on_fail_hint: >
      UNSCHEDULABLE — pod cannot be scheduled:
        GPU nodes missing/full: delete the InferenceService and its ServingRuntime,
          then recreate using a CPU runtime:
          oc process -n redhat-ods-applications vllm-cpu-runtime-template | oc apply -n {{ project_namespace }} -f -
          Use a small model: qwen2.5-0.5b-instruct (1 GB, needs ~6 Gi memory, ~4 CPU)
        CPU/memory insufficient: use a smaller model or reduce resource requests.
        Check resources: oc describe nodes | grep -A 5 "Allocated resources"
      IMAGEPULLBACKOFF — terminal, will never self-heal:
        Verify the OCI URI is correct and the registry is accessible.
        oc describe pod -l serving.kserve.io/inferenceservice={{ model_name }} -n {{ project_namespace }} | grep -A3 "Failed to pull"
      CRASHLOOPBACKOFF / OOMKILLED — check logs and apply one standard fix:
        oc logs -l serving.kserve.io/inferenceservice={{ model_name }} -n {{ project_namespace }} --tail=60
        OOMKilled fix: patch the InferenceService args to add --max-model-len=4096
          oc patch inferenceservice {{ model_name }} -n {{ project_namespace }} --type=json \
            -p '[{"op":"add","path":"/spec/predictor/model/args/-","value":"--max-model-len=4096"}]'
          Or use a smaller model and recreate.
        dtype errors: change --dtype in args (half → bfloat16, or remove --dtype)
        If the log is unclear: show the log output and stop — do not guess.

  - id: get-model-url
    confidence: doc-derived
    description: >
      Get the model endpoint from status.url.
      Route is auto-created by odh-model-controller — do NOT create Route manually.
      The endpoint requires a token when enable-auth=true.
    action:
      type: query
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.url}'"
      store_as: model_url
    post_check:
      assert: model_url is not empty
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.url}'"
      expected_min: 1
      timeout: "60s"
      on_fail: STOP
    return: |
      ✓ vLLM model deployed: {{ model_name }}

      Accelerator: {{ accelerator | upper }}
      Runtime:     {{ 'vLLM NVIDIA GPU ServingRuntime for KServe (built-in)' if accelerator == 'gpu' else 'vllm-cpu-runtime-amd64 (EXPERIMENTAL)' }}
      Model:       {{ model_oci_uri }}
      Endpoint:    {{ model_url }}

      Test:
        TOKEN=$(oc whoami -t)
        curl -k {{ model_url }}/v1/chat/completions \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"model": "{{ model_name }}", "messages": [{"role": "user", "content": "Hello!"}]}'

      Dashboard: https://<odh-dashboard>/ai-hub/deployments/{{ project_namespace }}

      NOTE for CPU deployments: ~3 tokens/s — very slow, not for production.
      For LlamaStack integration, use this endpoint as the VLLM_URL.

source_repos:
  - "https://github.com/kserve/kserve"
  - "https://github.com/opendatahub-io/kserve"
  - "https://github.com/opendatahub-io/opendatahub-operator"
  - "https://github.com/vllm-project/vllm"
  - "https://github.com/rh-aiservices-bu/vllm-openai-ubi9"

known_bad_patterns:
  - "CRITICAL: for GPU, never create 'vLLM NVIDIA GPU ServingRuntime for KServe' — it is BUILT-IN in RHOAI, reference it by name"
  - "CRITICAL: GPU and CPU use different --chat-template paths — GPU=/opt/app-root/template/..., CPU=/workspace/vllm/examples/..."
  - "never omit --dtype=half — without it vLLM defaults to bfloat16 which may not work on all GPUs"
  - "remove --enable-chunked-prefill for NVIDIA T4 GPUs — causes inference failures (vllm#2729)"
  - "HuggingFace is NOT supported as a Data Connection type in current RHOAI — use URI or OCI"
  - "never use Serverless/Advanced mode without Service Mesh and Serverless operators installed"

rollback_order:
  - "oc delete inferenceservice {{ model_name }} -n {{ project_namespace }}"
  - "oc delete servingruntime vllm-cpu-runtime-amd64 -n {{ project_namespace }} 2>/dev/null || true"
  - "oc delete secret {{ model_name }}-connection -n {{ project_namespace }}"
