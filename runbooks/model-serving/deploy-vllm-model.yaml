name: model-serving-deploy-vllm-model
description: >
  Deploy an LLM using vLLM serving runtime on KServe RawDeployment mode.
  Matches what the ODH dashboard creates (packages/kserve/src/deployModel.ts).

  KEY FACTS from dashboard source:
  - model-type annotation is ALWAYS 'Generative' for LLMs (not Predictive)
  - opendatahub.io/connections and opendatahub.io/connection-path are ALWAYS set
  - security.opendatahub.io/enable-auth: defaults to false (must be explicit)
  - ServingRuntime needs opendatahub.io/template-name + opendatahub.io/template-display-name
  - Resources path: spec.predictor.model.resources (NOT spec.predictor.resources)
  - shm emptyDir volume MUST be present in ServingRuntime containers
  - Supports model args via spec.predictor.model.args
rhoai_version_tested: null
confidence_overall: doc-derived

parameters:
  - name: project_namespace
    description: Project namespace to deploy the model in
    required: true
    discover_cmd: "oc get namespace -l opendatahub.io/dashboard=true --no-headers -o jsonpath='{.items[*].metadata.name}'"
    hint: "Must be an ODH Data Science Project"
    example: "my-data-science-project"
  - name: model_name
    description: Name for the InferenceService
    required: true
    example: "llama3-8b"
    hint: "Lowercase letters, numbers, hyphens only. Max 63 chars."
  - name: model_uri
    description: Path within the S3 bucket to the model weights directory
    required: true
    example: "models/llama3-8b"
    hint: "PATH within the bucket only. The S3 connection provides bucket/credentials."
  - name: s3_connection_name
    description: S3 connection secret name in the project
    required: false
    default: ""
    discover_cmd: "oc get secret -n {project_namespace} -l opendatahub.io/connection-type=s3 --no-headers -o jsonpath='{.items[*].metadata.name}' 2>/dev/null"
    hint: "Leave empty to auto-discover. Used as storage.key in spec."
  - name: gpu_count
    description: "Number of GPUs to request"
    required: false
    default: "1"
    enum: ["1", "2", "4", "8"]
    hint: "Must match available GPU node capacity"
  - name: memory_request
    description: "Memory request — rule of thumb: 2x model size in GB"
    required: false
    default: "24Gi"
    hint: "Llama 3 8B: 16-24Gi. Llama 3 70B: 140Gi (needs multiple GPUs)."
    example: "24Gi"
  - name: cpu_request
    description: CPU request for the model server
    required: false
    default: "4"
  - name: max_model_len
    description: Maximum context window length in tokens
    required: false
    default: "4096"
    hint: "Reduce if you get CUDA OOM errors. Common values: 2048, 4096, 8192."
  - name: min_replicas
    description: Minimum replicas
    required: false
    default: "1"

steps:
  - id: check-prerequisites
    confidence: doc-derived
    description: Verify KServe, GPU, namespace, and S3 connection prerequisites
    requires:
      - type: kserve-enabled
      - type: namespace
        name: "{{ project_namespace }}"
      - type: gpu-available
        can_auto_resolve: false
        blocker_message: "GPU nodes required for vLLM. Run: odh run rosa/setup-gpu-machinepool"
      - type: gpu-operator-installed
      - type: s3-connection
        namespace: "{{ project_namespace }}"
    action:
      type: none
    post_check:
      command: "oc get crd inferenceservices.serving.kserve.io --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "10s"
      on_fail: STOP

  - id: create-vllm-serving-runtime
    confidence: doc-derived
    description: >
      Create vLLM ServingRuntime matching the dashboard format.
      From dashboard source (packages/kserve/src/deployServer.ts):
      - opendatahub.io/template-name annotation REQUIRED (createServingRuntime sets it)
      - opendatahub.io/template-display-name annotation REQUIRED
      - opendatahub.io/dashboard: true label REQUIRED for dashboard visibility
      - openshift.io/display-name annotation REQUIRED
      - shm emptyDir volume REQUIRED (dashboard always injects it)
    pre_check:
      command: "oc get servingruntime vllm-runtime -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: true
      manifest: |
        apiVersion: serving.kserve.io/v1alpha1
        kind: ServingRuntime
        metadata:
          name: vllm-runtime
          namespace: {{ project_namespace }}
          labels:
            opendatahub.io/dashboard: "true"
          annotations:
            openshift.io/display-name: "vLLM"
            opendatahub.io/template-name: "vllm-runtime"
            opendatahub.io/template-display-name: "vLLM ServingRuntime for KServe"
        spec:
          multiModel: false
          supportedModelFormats:
            - name: vllm
              version: "1"
              autoSelect: true
          containers:
            - name: kserve-container
              image: quay.io/opendatahub/vllm:stable
              command:
                - python
                - -m
                - vllm.entrypoints.openai.api_server
              args:
                - "--port=8080"
                - "--model=/mnt/models"
                - "--served-model-name={{ model_name }}"
                - "--max-model-len={{ max_model_len }}"
                - "--tensor-parallel-size={{ gpu_count }}"
              ports:
                - containerPort: 8080
                  protocol: TCP
              resources:
                requests:
                  cpu: "{{ cpu_request }}"
                  memory: "{{ memory_request }}"
                  nvidia.com/gpu: "{{ gpu_count }}"
                limits:
                  cpu: "{{ cpu_request }}"
                  memory: "{{ memory_request }}"
                  nvidia.com/gpu: "{{ gpu_count }}"
              volumeMounts:
                - name: shm
                  mountPath: /dev/shm
          volumes:
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: 2Gi
    post_check:
      command: "oc get servingruntime vllm-runtime -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      timeout: "30s"
      on_fail: STOP
    rollback: "oc delete servingruntime vllm-runtime -n {{ project_namespace }}"

  - id: create-vllm-inference-service
    confidence: doc-derived
    description: >
      Create InferenceService for vLLM with ALL required annotations from dashboard source.
      model-type is 'Generative' for LLMs (confirmed from dashboard source).
      opendatahub.io/connections and connection-path are set by applyConnectionData.
      Resources at spec.predictor.model.resources (confirmed from hardware.ts).
    pre_check:
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: true
      manifest: |
        apiVersion: serving.kserve.io/v1beta1
        kind: InferenceService
        metadata:
          name: {{ model_name }}
          namespace: {{ project_namespace }}
          labels:
            opendatahub.io/dashboard: "true"
          annotations:
            openshift.io/display-name: "{{ model_name }}"
            openshift.io/description: ""
            opendatahub.io/model-type: "Generative"
            opendatahub.io/connections: "{{ s3_connection_name }}"
            opendatahub.io/connection-path: "{{ model_uri }}"
            security.opendatahub.io/enable-auth: "false"
            serving.kserve.io/deploymentMode: RawDeployment
        spec:
          predictor:
            minReplicas: {{ min_replicas }}
            model:
              modelFormat:
                name: vllm
              runtime: vllm-runtime
              resources:
                requests:
                  cpu: "{{ cpu_request }}"
                  memory: "{{ memory_request }}"
                  nvidia.com/gpu: "{{ gpu_count }}"
                limits:
                  cpu: "{{ cpu_request }}"
                  memory: "{{ memory_request }}"
                  nvidia.com/gpu: "{{ gpu_count }}"
              storage:
                key: "{{ s3_connection_name }}"
                path: "{{ model_uri }}"
    post_check:
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.modelStatus.states.activeModelState}'"
      expected: "Loaded"
      timeout: "900s"
      poll_interval: "30s"
      on_fail: STOP
    rollback: "oc delete inferenceservice {{ model_name }} -n {{ project_namespace }}"

  - id: get-vllm-endpoint
    confidence: doc-derived
    description: Get the OpenAI-compatible endpoint URL from status.url
    action:
      type: query
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.url}'"
      store_as: model_url
    post_check:
      assert: model_url is not empty
      command: "oc get inferenceservice {{ model_name }} -n {{ project_namespace }} -o jsonpath='{.status.url}'"
      expected_min: 1
      timeout: "30s"
      on_fail: STOP
    return: |
      ✓ vLLM model deployed: {{ model_name }}

      Model type: Generative (LLM)
      GPUs:       {{ gpu_count }}x nvidia.com/gpu
      Endpoint:   {{ model_url }}

      OpenAI-compatible API:
        curl -X POST {{ model_url }}/v1/chat/completions \
          -H "Content-Type: application/json" \
          -d '{"model": "{{ model_name }}", "messages": [{"role": "user", "content": "Hello!"}]}'

      Dashboard: Projects → {{ project_namespace }} → Models and model servers

      Annotations set (matching dashboard source):
        opendatahub.io/model-type: Generative
        opendatahub.io/connections: {{ s3_connection_name }}
        opendatahub.io/connection-path: {{ model_uri }}

known_bad_patterns:
  - "CRITICAL: model-type must be 'Generative' for LLMs — never use 'Predictive' for vLLM deployments"
  - "CRITICAL: resources must be at spec.predictor.model.resources, not spec.predictor.resources"
  - "CRITICAL: ServingRuntime must have opendatahub.io/template-name and opendatahub.io/template-display-name annotations"
  - "never omit the shm emptyDir volume in ServingRuntime — dashboard always injects it"
  - "never omit opendatahub.io/connections annotation — dashboard reads it to link to connection"
  - "never set tensor-parallel-size higher than gpu_count — vLLM will fail to start"
  - "never deploy without GPU — CPU inference with vLLM is not supported"

rollback_order:
  - "oc delete inferenceservice {{ model_name }} -n {{ project_namespace }}"
  - "oc delete servingruntime vllm-runtime -n {{ project_namespace }}"
