name: rosa-fix-imagestream-registry
description: >
  Fix ImageStream pull errors in pre-release RHOAI environments.
  Problem: Some pre-release RHOAI environments have ImageStreams that fail to pull
  because they point to registry.redhat.io instead of the required quay.io.
  Solution: Patch the ImageStream tags to redirect from registry.redhat.io to quay.io.

  This automates the process from:
    devtools/RHOAI-on-ROSA/install-rhoai/tools/isfix/is_registry_fix.py

  Symptoms: Workbench images fail to load, pods stuck in ImagePullBackOff.
  Check: oc get is -n redhat-ods-applications | shows tags from registry.redhat.io

  Manual fix for a single tag:
    oc patch is <name> -n redhat-ods-applications -p '{"spec":{"tags":[{"name":"<tag>","from":{"kind":"DockerImage","name":"quay.io/rhoai/<image>@sha256:..."}}]}}'
    oc import-image <name>:<tag> -n redhat-ods-applications --confirm
rhoai_version_tested: null
confidence_overall: doc-derived

parameters:
  - name: imagestream_names
    description: "Space-separated ImageStream names to fix (e.g. 'minimal-gpu pytorch'). Leave empty to fix all."
    required: false
    default: ""
  - name: namespace
    description: Namespace containing the ImageStreams
    required: false
    default: redhat-ods-applications
  - name: dry_run
    description: "Show what would be changed without applying (true/false)"
    required: false
    default: "false"

steps:
  - id: check-python-available
    confidence: doc-derived
    description: Verify Python 3.7+ is available (required by the fix tool)
    requires:
      - type: openshift-cluster
    pre_check:
      command: "python3 --version 2>/dev/null | grep -c 'Python 3' || echo 0"
      expected_min: 1
      on_fail: STOP
    action:
      type: none
    post_check:
      command: "python3 --version 2>/dev/null | grep -c 'Python 3' || echo 0"
      expected_min: 1
      timeout: "10s"
      on_fail: STOP

  - id: scan-problematic-imagestreams
    confidence: doc-derived
    description: >
      Scan ImageStreams for tags pointing to registry.redhat.io.
      These are the ones causing ImagePullBackOff errors.
    action:
      type: query
      command: |
        echo "=== Scanning ImageStreams in {{ namespace }} ==="
        echo ""
        oc get is -n {{ namespace }} --no-headers 2>/dev/null | awk '{print $1}' | while read IS_NAME; do
          BAD_TAGS=$(oc get is "$IS_NAME" -n {{ namespace }} -o json 2>/dev/null | \
            jq -r '.spec.tags // [] | .[] | select(.from.kind == "DockerImage") |
            select(.from.name | contains("registry.redhat.io")) |
            "  tag \(.name): \(.from.name)"' 2>/dev/null)
          if [ -n "$BAD_TAGS" ]; then
            echo "✗ $IS_NAME:"
            echo "$BAD_TAGS"
            echo ""
          fi
        done
        echo "=== Scan complete ==="
      store_as: scan_results
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "60s"
      on_fail: STOP

  - id: run-isfix-tool
    confidence: doc-derived
    description: >
      Run the is_registry_fix.py tool from devtools to patch ImageStreams.
      The tool is available at devtools/RHOAI-on-ROSA/install-rhoai/tools/isfix/is_registry_fix.py
      Finds the script automatically or runs the equivalent inline logic.
    action:
      type: query
      command: |
        # Fix ImageStreams: replace registry.redhat.io tags with quay.io equivalents.
        # For each ImageStream, find DockerImage tags pointing to registry.redhat.io
        # and patch them to quay.io, then trigger import-image.
        echo "Fixing ImageStreams in {{ namespace }}..."
        oc get is -n {{ namespace }} --no-headers 2>/dev/null | awk '{print $1}' | while read IS_NAME; do
          TAGS=$(oc get is "$IS_NAME" -n {{ namespace }} -o json 2>/dev/null | \
            jq -r '.spec.tags // [] | to_entries[] | select(.value.from.kind == "DockerImage") |
            select(.value.from.name | contains("registry.redhat.io")) |
            "\(.key) \(.value.name) \(.value.from.name)"' 2>/dev/null || true)
          if [ -n "$TAGS" ]; then
            echo "$TAGS" | while IFS=' ' read IDX TAG_NAME OLD_IMG; do
              NEW_IMG=$(echo "$OLD_IMG" | sed 's|registry.redhat.io/|quay.io/|g')
              echo "  Patching $IS_NAME:$TAG_NAME: $OLD_IMG -> $NEW_IMG"
              if [ "{{ dry_run }}" != "true" ]; then
                oc patch is "$IS_NAME" -n {{ namespace }} --type=json \
                  -p "[{\"op\":\"replace\",\"path\":\"/spec/tags/$IDX/from/name\",\"value\":\"$NEW_IMG\"}]" 2>&1 || true
                oc import-image "$IS_NAME:$TAG_NAME" -n {{ namespace }} --confirm 2>/dev/null || true
              fi
            done
          fi
        done
        echo "Fix complete."
        echo "Fix operation complete"
      store_as: fix_results
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "300s"
      on_fail: STOP
    return: |
      ✓ ImageStream registry fix complete.

      Scan results:
      {{ scan_results }}

      Fix results:
      {{ fix_results }}

      Verify fixed ImageStreams:
        oc get is -n {{ namespace }}

      For any remaining issues, run the isfix tool manually:
        python3 devtools/RHOAI-on-ROSA/install-rhoai/tools/isfix/is_registry_fix.py \
          <imagestream-name> -n {{ namespace }}

      Manual fix for a single tag:
        oc patch is <name> -n {{ namespace }} \
          -p '{"spec":{"tags":[{"name":"<tag>","from":{"kind":"DockerImage","name":"quay.io/rhoai/<image>@sha256:..."}}]}}'
        oc import-image <name>:<tag> -n {{ namespace }} --confirm

source_repos:
  - "https://github.com/opendatahub-io/opendatahub-operator"
  - "https://github.com/openshift/rosa"

known_bad_patterns:
  - "never change the sha256 digest when redirecting — only change the registry prefix"
  - "never run this on stable RHOAI clusters — it's only needed for pre-release builds"
  - "after patching, always run oc import-image to refresh metadata"

rollback_order: []
