name: rosa-install-rhoai-prerelease
description: >
  Install a pre-release (RC/nightly) version of RHOAI on an OpenShift cluster.

  WHY KYVERNO (ROSA-hosted only):
  On ROSA-hosted, two things make the normal approach impossible:
  1. OCPBUGS-23901 — the global pull-secret in openshift-config is immediately
     overwritten by ROSA management, so you cannot add credentials the normal way.
  2. ImageContentSourcePolicy was tried but does not work on ROSA-hosted (confirmed
     in testing). Even if it redirected URLs, bugzilla 1773806 blocks authentication.
  Kyverno is the only viable cluster-wide workaround for ROSA-hosted clusters.

  ON STANDARD OCP / LOCAL CLUSTERS (< 2 nodes):
  This script detects non-ROSA environments and uses the simpler approach:
  update the global pull-secret directly + apply ImageContentSourcePolicy.
  No Kyverno needed. This is handled automatically.

  FOR INDIVIDUAL IMAGESTREAM FIXES (post-install):
  If specific workbench images fail after installation, use:
    odh run rosa/fix-imagestream-registry
  This patches individual ImageStreams rather than the whole cluster.

  GETTING CREDENTIALS:
  Two registries need credentials.

  quay.io/rhoai (for FBC pre-release images):
    → Requires access to the quay.io/rhoai organization.
      Ask your team lead to grant you access if you don't have it.
    → Once granted: log into quay.io → Account Settings →
      Docker CLI Password → Generate Encrypted Password →
      Docker Configuration → copy the auth value.
    → Test access: visit https://quay.io/organization/rhoai — you should see repositories.

  registry.redhat.io (any Red Hat employee or customer, 2 minutes, no approval needed):
    → https://access.redhat.com/terms-based-registry/accounts
    → New Service Account → Docker Configuration tab → copy auth value.

  brew.registry.redhat.io (for IIB images — internal Red Hat only):
    → Requires internal Red Hat brew registry credentials.
    → Use FBC images from quay.io/rhoai instead if you don't have brew access.

  PRE-RELEASE IMAGE FORMATS:
    FBC (recommended for most): quay.io/rhoai/rhoai-fbc-fragment:rhoai-{VERSION}@sha256:{SHA}
    IIB (internal RH only):     brew.registry.redhat.io/rh-osbs/iib:{IIB_NUMBER}

  WARNING: On ROSA-hosted, delete Kyverno BEFORE deleting the cluster.
  See rosa/teardown-kyverno — failure causes ACM-12961 blocking cluster deletion.

rhoai_version_tested: null
confidence_overall: doc-derived

parameters:
  - name: rhoai_image
    description: Pre-release RHOAI FBC or IIB image to install
    required: true
    example: "quay.io/rhoai/rhoai-fbc-fragment:rhoai-2.16@sha256:b56bdb89d8804c71e02068d08569ea2f27397a812e533d81428f89f18324f292"
    hint: >
      Find latest image digest from your team's release channel.
      Always include the @sha256: digest — never use a floating tag.
      FBC images (quay.io/rhoai) are preferred over IIB — accessible with quay.io org access only.
  - name: install_type
    description: "Installation type: 'operator' (standalone) or 'addon' (managed)"
    required: false
    default: operator
    enum: ["operator", "addon"]
    hint: "Use 'operator' for most cases."
  - name: docker_config_path
    description: Path to docker config.json with registry credentials
    required: false
    default: "~/.docker/config.json"
    hint: >
      Must contain quay.io/rhoai (robot account) AND registry.redhat.io credentials.
      Get quay.io/rhoai auth: contact the RHOAI DevOps team for the
        rhoai+devops_rhoai_readonly_bot robot account auth secret.
      Get registry.redhat.io: https://access.redhat.com/terms-based-registry/accounts
    example: "~/.docker/config.json"
  - name: kyverno_version
    description: Kyverno version (only used on ROSA-hosted, auto-skipped on standard OCP)
    required: false
    default: "v1.12.4"
    hint: "Check https://github.com/kyverno/kyverno/releases for the latest version"

steps:
  - id: verify-prerequisites
    confidence: doc-derived
    description: Verify oc login, docker config exists with required credentials, jq and yq installed
    requires:
      - type: openshift-cluster
    pre_check:
      command: "oc whoami 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      on_fail: STOP
    action:
      type: query
      command: |
        command -v jq > /dev/null || { echo "ERROR: jq not installed. Run: brew install jq"; exit 1; }
        command -v yq > /dev/null || { echo "ERROR: yq not installed. Run: brew install yq"; exit 1; }
        test -f {{ docker_config_path }} || { echo "ERROR: {{ docker_config_path }} not found. See runbook description for credential instructions."; exit 1; }
        jq -e '.auths."quay.io/rhoai" // .auths."quay.io"' {{ docker_config_path }} > /dev/null 2>&1 || { echo "ERROR: quay.io/rhoai credentials missing. Obtain the auth secret for rhoai+devops_rhoai_readonly_bot from the RHOAI DevOps team."; exit 1; }
        jq -e '.auths."registry.redhat.io"' {{ docker_config_path }} > /dev/null 2>&1 || { echo "ERROR: registry.redhat.io credentials missing. Get them at https://access.redhat.com/terms-based-registry/accounts"; exit 1; }
        echo "Prerequisites OK"
      store_as: prereq_check
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "15s"
      on_fail: STOP

  - id: detect-cluster-type
    confidence: doc-derived
    description: >
      Detect ROSA-hosted (>= 2 nodes) vs standard OCP/local (< 2 nodes).
      ROSA-hosted requires Kyverno. Standard OCP uses direct pull-secret update + ICSP.
    action:
      type: query
      command: "oc get nodes --no-headers 2>/dev/null | grep -v NAME | wc -l | tr -d ' '"
      store_as: node_count
    post_check:
      assert: node_count is not empty
      command: "echo ok"
      expected: "ok"
      timeout: "10s"
      on_fail: STOP

  - id: create-combined-pull-secret
    confidence: doc-derived
    description: Merge cluster pull-secret with quay.io and registry.redhat.io credentials
    action:
      type: query
      command: |
        oc get -n openshift-config secret/pull-secret -o yaml \
          | yq .data[.dockerconfigjson] | base64 -d > /tmp/cluster-pull-secret.json
        # Prefer quay.io/rhoai-scoped credential (robot account rhoai+devops_rhoai_readonly_bot)
        # over generic quay.io — the fbc-fragment repo requires org-scoped auth
        QUAY_AUTH=$(jq -cr '.auths["quay.io/rhoai"].auth // .auths["quay.io"].auth' {{ docker_config_path }})
        jq ".auths[\"quay.io/rhoai\"] = {\"auth\": \"$QUAY_AUTH\"}" \
          /tmp/cluster-pull-secret.json > /tmp/merged-pull-secret.json
        if jq -e '.auths."registry.redhat.io"' {{ docker_config_path }} > /dev/null 2>&1; then
          jq ".auths[\"registry.redhat.io\"] = {\"auth\": \"$(jq -cr '.auths["registry.redhat.io"].auth' {{ docker_config_path }})\"}" \
            /tmp/merged-pull-secret.json > /tmp/merged-pull-secret-final.json
          mv /tmp/merged-pull-secret-final.json /tmp/merged-pull-secret.json
        fi
        echo "Pull secret merged"
      store_as: pull_secret_status
    post_check:
      command: "test -f /tmp/merged-pull-secret.json && echo ok"
      expected: "ok"
      timeout: "30s"
      on_fail: STOP

  - id: standard-ocp-direct-approach
    confidence: doc-derived
    description: >
      STANDARD OCP ONLY (< 2 nodes): Update global pull-secret + apply ICSP.
      This is the normal, simple approach that works on non-ROSA clusters.
      On ROSA-hosted this is skipped and Kyverno is used instead.
    pre_check:
      command: "[ '{{ node_count }}' -lt '2' ] && echo needed || echo skip"
      expected: "needed"
      if_already_true: skip
      on_fail: STOP
    action:
      type: query
      command: |
        echo "Standard OCP detected ({{ node_count }} node) — using direct approach (no Kyverno needed)"
        oc set data secret/pull-secret -n openshift-config \
          --from-file=.dockerconfigjson=/tmp/merged-pull-secret.json
        oc apply -f - <<EOF
        apiVersion: operator.openshift.io/v1alpha1
        kind: ImageContentSourcePolicy
        metadata:
          name: quaysource
        spec:
          repositoryDigestMirrors:
          - mirrors:
            - quay.io/rhoai
            source: registry.redhat.io/rhoai
        EOF
        rm -f /tmp/merged-pull-secret.json /tmp/cluster-pull-secret.json
        echo "Done — skip to operator install"
      store_as: standard_result
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "60s"
      on_fail: STOP

  - id: rosa-create-pull-secret
    confidence: doc-derived
    description: >
      ROSA-HOSTED ONLY (>= 2 nodes): Store merged credentials as 'pull-secret-brew'
      in openshift-config. Named differently from default to avoid ROSA management conflicts.
    pre_check:
      command: "[ '{{ node_count }}' -ge '2' ] && echo needed || echo skip"
      expected: "needed"
      if_already_true: skip
      on_fail: STOP
    action:
      type: query
      command: |
        oc delete secret pull-secret-brew -n openshift-config 2>/dev/null || true
        oc create secret generic pull-secret-brew \
          -n openshift-config \
          --from-file=.dockerconfigjson=/tmp/merged-pull-secret.json \
          --type=kubernetes.io/dockerconfigjson
        rm -f /tmp/merged-pull-secret.json /tmp/cluster-pull-secret.json
        echo "created"
      store_as: secret_status
    post_check:
      command: "oc get secret pull-secret-brew -n openshift-config --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "30s"
      on_fail: STOP
    rollback: "oc delete secret pull-secret-brew -n openshift-config 2>/dev/null || true"

  - id: rosa-install-kyverno
    confidence: doc-derived
    description: >
      ROSA-HOSTED ONLY: Install Kyverno {{ kyverno_version }}.
      Kyverno is needed because on ROSA-hosted:
        - Global pull-secret gets overwritten (OCPBUGS-23901)
        - ImageContentSourcePolicy doesn't work (confirmed in testing)
      Kyverno mutating webhooks are the only viable cluster-wide solution on ROSA-hosted.
    pre_check:
      command: "[ '{{ node_count }}' -ge '2' ] && echo needed || echo skip"
      expected: "needed"
      if_already_true: skip
      on_fail: STOP
    action:
      type: query
      command: |
        oc create -f https://github.com/kyverno/kyverno/releases/download/{{ kyverno_version }}/install.yaml 2>/dev/null || true
        echo "submitted"
      store_as: kyverno_install
    post_check:
      command: "oc get deployment kyverno-admission-controller -n kyverno --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "300s"
      poll_interval: "15s"
      on_fail: STOP
    rollback: "oc delete -f https://github.com/kyverno/kyverno/releases/download/{{ kyverno_version }}/install.yaml 2>/dev/null || true"

  - id: rosa-wait-kyverno-and-apply-policies
    confidence: doc-derived
    description: >
      ROSA-HOSTED ONLY: Wait for Kyverno, then apply three ClusterPolicies:
      1. sync-secrets: copies pull-secret-brew to every namespace
      2. add-imagepullsecrets: injects it into all matching pods
      3. replace-image-registry: redirects registry.redhat.io/rhoai → quay.io/rhoai
    pre_check:
      command: "[ '{{ node_count }}' -ge '2' ] && echo needed || echo skip"
      expected: "needed"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: false
      manifest: |
        apiVersion: kyverno.io/v1
        kind: ClusterPolicy
        metadata:
          name: sync-secrets
          annotations:
            policies.kyverno.io/title: Sync Secrets
            policies.kyverno.io/description: >-
              Workaround OCPBUGS-23901: copies pull-secret-brew to all namespaces.
        spec:
          failurePolicy: Ignore
          generateExistingOnPolicyUpdate: true
          rules:
          - name: sync-image-pull-secret
            match:
              any:
              - resources:
                  kinds: [Namespace]
            generate:
              apiVersion: v1
              kind: Secret
              name: pull-secret-brew
              namespace: "{{request.object.metadata.name}}"
              synchronize: true
              clone:
                namespace: openshift-config
                name: pull-secret-brew
        ---
        apiVersion: kyverno.io/v1
        kind: ClusterPolicy
        metadata:
          name: add-imagepullsecrets
          annotations:
            policies.kyverno.io/title: Add imagePullSecrets
            policies.kyverno.io/description: >-
              Workaround OCPBUGS-23901: inject pull-secret-brew into all matching pods.
        spec:
          failurePolicy: Ignore
          rules:
          - name: add-imagepullsecret
            match:
              any:
              - resources:
                  kinds: [Pod]
            preconditions:
              any:
              - key: "{{ images.initContainers.*.registry || `[]` }}"
                operator: AnyIn
                value: [brew.registry.redhat.io, quay.io, registry.stage.redhat.io, registry-proxy.engineering.redhat.com, registry.redhat.io]
              - key: "{{ images.containers.*.registry }}"
                operator: AnyIn
                value: [brew.registry.redhat.io, quay.io, registry.stage.redhat.io, registry-proxy.engineering.redhat.com, registry.redhat.io]
            mutate:
              patchesJson6902: |-
                - path: "/spec/imagePullSecrets/-"
                  op: add
                  value:
                    name: pull-secret-brew
        ---
        apiVersion: kyverno.io/v1
        kind: ClusterPolicy
        metadata:
          name: replace-image-registry
          annotations:
            policies.kyverno.io/title: Replace Image Registry
            pod-policies.kyverno.io/autogen-controllers: none
            policies.kyverno.io/description: >-
              Redirect registry.redhat.io/rhoai to quay.io/rhoai.
              Alternative to ImageContentSourcePolicy (does not work on ROSA-hosted).
        spec:
          background: false
          failurePolicy: Ignore
          rules:
            - name: replace-image-registry-containers
              match:
                any:
                - resources:
                    kinds: [Pod]
              mutate:
                foreach:
                - list: "request.object.spec.containers"
                  patchStrategicMerge:
                    spec:
                      containers:
                      - name: "{{ element.name }}"
                        image: "{{ regex_replace_all_literal('registry\\.redhat\\.io/rhoai/', '{{element.image}}', 'quay.io/rhoai/' )}}"
            - name: replace-image-registry-initcontainers
              match:
                any:
                - resources:
                    kinds: [Pod]
              preconditions:
                all:
                - key: "{{ request.object.spec.initContainers[] || `[]` | length(@) }}"
                  operator: GreaterThanOrEquals
                  value: 1
              mutate:
                foreach:
                - list: "request.object.spec.initContainers"
                  patchStrategicMerge:
                    spec:
                      initContainers:
                      - name: "{{ element.name }}"
                        image: "{{ regex_replace_all_literal('registry\\.redhat\\.io/rhoai/', '{{element.image}}', 'quay.io/rhoai/' )}}"
    post_check:
      command: "oc get clusterpolicy sync-secrets add-imagepullsecrets replace-image-registry --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "3"
      timeout: "60s"
      on_fail: STOP

  - id: install-service-mesh-operator
    confidence: doc-derived
    description: Install Red Hat Service Mesh operator (required for RHOAI networking)
    pre_check:
      command: "oc get subscription servicemeshoperator -n openshift-operators --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: false
      manifest: |
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          name: servicemeshoperator
          namespace: openshift-operators
        spec:
          channel: stable
          installPlanApproval: Automatic
          name: servicemeshoperator
          source: redhat-operators
          sourceNamespace: openshift-marketplace
    post_check:
      command: "oc get csv -n openshift-operators --no-headers 2>/dev/null | grep -iE 'servicemesh|istio' | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "300s"
      poll_interval: "20s"
      on_fail: STOP

  - id: install-serverless-operator
    confidence: doc-derived
    description: Install Red Hat OpenShift Serverless operator (required for KServe Serverless mode)
    pre_check:
      command: "oc get subscription serverless-operator -n openshift-operators --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: false
      manifest: |
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          name: serverless-operator
          namespace: openshift-operators
        spec:
          channel: stable
          installPlanApproval: Automatic
          name: serverless-operator
          source: redhat-operators
          sourceNamespace: openshift-marketplace
    post_check:
      command: "oc get csv -n openshift-operators --no-headers 2>/dev/null | grep -i serverless | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "300s"
      poll_interval: "20s"
      on_fail: STOP

  - id: install-rhoai-operator
    confidence: doc-derived
    description: >
      Install the RHOAI operator using the pre-release FBC or IIB image.
      Creates CatalogSource + Subscription. Requires ROSA 4.19.17+ for compatibility.
    pre_check:
      command: "oc get subscription rhods-operator -n redhat-ods-operator --no-headers 2>/dev/null | wc -l | tr -d ' '"
      expected: "1"
      if_already_true: skip
      on_fail: STOP
    action:
      type: apply
      dry_run: false
      manifest: |
        apiVersion: v1
        kind: Namespace
        metadata:
          name: redhat-ods-operator
        ---
        apiVersion: operators.coreos.com/v1
        kind: OperatorGroup
        metadata:
          name: rhods-operator
          namespace: redhat-ods-operator
        ---
        apiVersion: operators.coreos.com/v1alpha1
        kind: CatalogSource
        metadata:
          name: rhoai-catalog-dev
          namespace: openshift-marketplace
        spec:
          sourceType: grpc
          image: "{{ rhoai_image }}"
          displayName: RHOAI Dev Catalog
          publisher: Red Hat
          updateStrategy:
            registryPoll:
              interval: 10m
        ---
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          name: rhods-operator
          namespace: redhat-ods-operator
        spec:
          channel: fast
          installPlanApproval: Automatic
          name: rhods-operator
          source: rhoai-catalog-dev
          sourceNamespace: openshift-marketplace
    post_check:
      command: "oc get csv -n redhat-ods-operator --no-headers 2>/dev/null | grep -iE 'rhods|openshift-ai' | wc -l | tr -d ' '"
      expected_min: 1
      timeout: "600s"
      poll_interval: "20s"
      on_fail: STOP

  - id: wait-operator-ready
    confidence: doc-derived
    description: Wait for RHOAI operator CSV to reach Succeeded phase
    action:
      type: query
      command: "oc get csv -n redhat-ods-operator --no-headers 2>/dev/null | grep -iE 'rhods|openshift-ai' | awk '{print $1}' | head -1"
      store_as: csv_name
    post_check:
      command: "oc get csv {{ csv_name }} -n redhat-ods-operator -o jsonpath='{.status.phase}' 2>/dev/null"
      expected: "Succeeded"
      timeout: "600s"
      poll_interval: "20s"
      on_fail: STOP
    return: |
      ✓ RHOAI pre-release installed.

      Image used:  {{ rhoai_image }}
      Cluster:     {{ node_count }} node(s)
      Method:      {{ 'Kyverno (ROSA-hosted — ICSP not supported)' if node_count|int >= 2 else 'Direct pull-secret + ICSP (standard OCP)' }}
      CSV:         {{ csv_name }}

      Verify: oc get pods -n redhat-ods-applications

      Next steps:
        odh run rosa/verify-rhoai-install
        odh run cluster/full-stack-setup -p s3_endpoint=... -p s3_access_key=...

      If individual ImageStreams fail to pull workbench images:
        odh run rosa/fix-imagestream-registry

      ⚠ ROSA-hosted only — before deleting this cluster:
        odh run rosa/teardown-kyverno
        (Required: Kyverno webhooks block cluster deletion — ACM-12961)

source_repos:
  - "https://github.com/opendatahub-io/opendatahub-operator"
  - "https://github.com/openshift/rosa"

known_bad_patterns:
  - "CRITICAL (ROSA only): never delete the cluster without running teardown-kyverno first — ACM-12961 blocks deletion"
  - "never try to update the global pull-secret on ROSA-hosted — it gets overwritten (OCPBUGS-23901)"
  - "never apply ImageContentSourcePolicy on ROSA-hosted — it does not work (confirmed in testing)"
  - "never use a floating image tag without @sha256: — the image may change"
  - "on standard OCP with < 2 nodes, Kyverno is NOT needed — the script uses direct pull-secret + ICSP instead"

  - "brew.registry.redhat.io IIB images require internal Red Hat credentials — use FBC images (quay.io/rhoai) if you don't have brew access"

rollback_order:
  - "oc delete subscription rhods-operator -n redhat-ods-operator 2>/dev/null || true"
  - "oc delete catalogsource rhoai-catalog-dev -n openshift-marketplace 2>/dev/null || true"
  - "oc delete clusterpolicy sync-secrets add-imagepullsecrets replace-image-registry 2>/dev/null || true"
  - "oc delete -f https://github.com/kyverno/kyverno/releases/download/{{ kyverno_version }}/install.yaml 2>/dev/null || true"
  - "oc delete secret pull-secret-brew -n openshift-config 2>/dev/null || true"
  - "rm -f /tmp/merged-pull-secret.json /tmp/cluster-pull-secret.json"

tags: ["rosa", "setup", "prerelease"]
estimated_minutes: 25
next_steps:
  - "Verify: odh run rosa/verify-rhoai-install"
  - "Setup components: odh run cluster/full-stack-setup"
  - "IMPORTANT before deleting ROSA cluster: odh run rosa/teardown-kyverno"
