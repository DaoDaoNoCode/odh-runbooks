name: rosa-prepare-registry-credentials
description: >
  Prepare local registry credentials needed before installing RHOAI pre-release.
  This must be run on your LOCAL MACHINE (not in the cluster).

  You need credentials for two registries:

  quay.io (for FBC pre-release images):
    Requires access to the quay.io/rhoai organization. Ask your team lead
    to grant you access if you don't have it. Then:
      docker login quay.io
      (uses your quay.io account credentials)

  registry.redhat.io (for base images):
    Any Red Hat employee or customer can get this independently:
      https://access.redhat.com/terms-based-registry/accounts

  brew.registry.redhat.io (for IIB images — internal Red Hat only):
    Requires internal Red Hat brew registry credentials.
    Use FBC images from quay.io/rhoai if you don't have this.

  This runbook validates that credentials are in place before proceeding.
rhoai_version_tested: null
confidence_overall: doc-derived

parameters:
  - name: docker_config_path
    description: Path to docker credentials file
    required: false
    default: "~/.docker/config.json"

steps:
  - id: check-docker-config-exists
    confidence: doc-derived
    description: Verify docker config.json exists
    pre_check:
      command: "test -f {{ docker_config_path }} && echo exists || echo missing"
      expected: "exists"
      on_fail: STOP
    action:
      type: none
    post_check:
      command: "test -f {{ docker_config_path }} && echo ok"
      expected: "ok"
      timeout: "5s"
      on_fail: STOP
    on_fail_hint: >
      Run: docker login quay.io && docker login registry.redhat.io
      Then check that ~/.docker/config.json was created.

  - id: validate-tools
    confidence: doc-derived
    description: Verify jq and yq are installed (required by the pull secret script)
    action:
      type: query
      command: |
        echo "jq: $(command -v jq || echo NOT FOUND)"
        echo "yq: $(command -v yq || echo NOT FOUND)"
        command -v jq > /dev/null || { echo "Install: brew install jq"; exit 1; }
        command -v yq > /dev/null || { echo "Install: brew install yq"; exit 1; }
        echo "Both tools present"
      store_as: tool_check
    post_check:
      command: "command -v jq > /dev/null && command -v yq > /dev/null && echo ok"
      expected: "ok"
      timeout: "10s"
      on_fail: STOP

  - id: check-quay-credentials
    confidence: doc-derived
    description: Verify quay.io credentials are present and non-empty
    pre_check:
      command: "jq -e '.auths.\"quay.io/rhoai\" // .auths.\"quay.io\"' {{ docker_config_path }} > /dev/null 2>&1 && echo found || echo missing"
      expected: "found"
      on_fail: STOP
    action:
      type: query
      command: |
        # Check quay.io/rhoai first (org-scoped robot account), fall back to quay.io
        QUAY_AUTH=$(jq -r '.auths."quay.io/rhoai".auth // .auths."quay.io".auth // empty' {{ docker_config_path }})
        if [ -z "$QUAY_AUTH" ]; then
          echo "ERROR: quay.io/rhoai auth token is empty"
          echo "You need the auth secret for robot account: rhoai+devops_rhoai_readonly_bot"
          echo "Contact the RHOAI DevOps team to obtain it."
          exit 1
        fi
        # Report which key was found
        if jq -e '.auths."quay.io/rhoai"' {{ docker_config_path }} > /dev/null 2>&1; then
          echo "quay.io/rhoai credentials: present (org-scoped robot account)"
        else
          echo "quay.io credentials: present (generic — may not have fbc-fragment access)"
        fi
      store_as: quay_check
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "10s"
      on_fail: STOP
    on_fail_hint: >
      You need the auth secret for the rhoai+devops_rhoai_readonly_bot robot account.
      Contact the RHOAI DevOps team to obtain the auth secret, then add it to
      ~/.docker/config.json under the key "quay.io/rhoai".
      The entry should look like:
        { "auths": { "quay.io/rhoai": { "auth": "<base64-auth-secret>" } } }

  - id: check-registry-redhat-credentials
    confidence: doc-derived
    description: Verify registry.redhat.io credentials are present
    pre_check:
      command: "jq -e '.auths.\"registry.redhat.io\"' {{ docker_config_path }} > /dev/null 2>&1 && echo found || echo missing"
      expected: "found"
      on_fail: STOP
    action:
      type: query
      command: |
        RH_AUTH=$(jq -r '.auths."registry.redhat.io".auth // empty' {{ docker_config_path }})
        if [ -z "$RH_AUTH" ]; then
          echo "ERROR: registry.redhat.io auth token is empty"
          exit 1
        fi
        echo "registry.redhat.io credentials: present"
      store_as: rh_check
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "10s"
      on_fail: STOP
    on_fail_hint: >
      Get your registry.redhat.io credentials (2 minutes, no approval needed):
        1. Go to https://access.redhat.com/terms-based-registry/accounts
        2. Click New Service Account
        3. Click your account name → Docker Configuration tab
        4. Run: docker login registry.redhat.io (using the credentials shown)

  - id: verify-quay-rhoai-access
    confidence: doc-derived
    description: Verify quay.io credentials can access the quay.io/rhoai organization
    action:
      type: query
      command: |
        if command -v podman > /dev/null 2>&1; then
          if podman search --authfile {{ docker_config_path }} --limit 1 quay.io/rhoai/ > /dev/null 2>&1; then
            echo "✓ quay.io/rhoai access confirmed"
          else
            echo "⚠ Cannot access quay.io/rhoai with current credentials"
            echo "  Ask your team lead to grant you access to the quay.io/rhoai organization"
          fi
        else
          echo "podman not available — skipping org access check"
        fi
      store_as: access_check
    post_check:
      command: "echo ok"
      expected: "ok"
      timeout: "30s"
      on_fail: STOP
    return: |
      ✓ Registry credentials verified.

      quay.io:            {{ quay_check }}
      registry.redhat.io: {{ rh_check }}
      quay.io/rhoai org:  {{ access_check }}

      Ready to install:
        odh run rosa/install-rhoai-prerelease \
          -p rhoai_image=quay.io/rhoai/rhoai-fbc-fragment:rhoai-2.XX@sha256:...

      FBC image format (always use the @sha256: digest, never a floating tag):
        quay.io/rhoai/rhoai-fbc-fragment:rhoai-{VERSION}@sha256:{DIGEST}

source_repos:
  - "https://github.com/opendatahub-io/opendatahub-operator"
  - "https://github.com/openshift/rosa"

known_bad_patterns:
  - "never use a floating image tag without @sha256: digest — the image may change and you won't know which build you're testing"
  - "brew.registry.redhat.io IIB images require internal Red Hat credentials — use FBC images from quay.io/rhoai instead if you don't have brew access"

rollback_order: []
